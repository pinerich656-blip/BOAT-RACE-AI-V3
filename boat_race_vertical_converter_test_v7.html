<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>縦並び元データ整形テスト v6</title>
<style>
body{margin:0;padding:16px;background:#0b1220;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.wrap{max-width:980px;margin:0 auto}
.card{background:#121c33;border:1px solid #243352;border-radius:16px;padding:14px;margin:12px 0}
textarea{width:100%;min-height:260px;background:#08101d;color:#fff;border:1px solid #243352;border-radius:12px;padding:12px;box-sizing:border-box;font-size:14px;line-height:1.6}
button{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;font-size:18px;font-weight:900;cursor:pointer}
.small{font-size:12px;color:#9fb0d1;line-height:1.7}
.ok{color:#86efac}.ng{color:#fca5a5}
pre{white-space:pre-wrap;word-break:break-word;background:#08101d;border:1px solid #243352;border-radius:12px;padding:12px}
.big{font-size:24px;font-weight:900;color:#facc15}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="big">v7 新版</div>
    <div class="small">デバッグ結果を反映して、<strong>F0 / L0 が別行でも読めるように修正</strong>しました。<br>ボタンは <strong>「ここを押して整形する（v7）」</strong> です。</div>
  </div>

  <div class="card">
    <textarea id="raw" placeholder="ここに元データをそのまま貼り付け"></textarea>
    <button id="run">ここを押して整形する（v7）</button>
  </div>

  <div class="card">
    <div id="status">結果待ち</div>
  </div>

  <div class="card">
    <h3>整形結果</h3>
    <textarea id="out"></textarea>
  </div>

  <div class="card">
    <h3>抽出した今節成績</h3>
    <pre id="forms">結果待ち</pre>
  </div>

  <div class="card">
    <h3>デバッグ</h3>
    <pre id="debug">結果待ち</pre>
  </div>
</div>

<script>
function splitLines(text){
  return String(text||"").split(/\r?\n/).map(s=>s.replace(/\u00A0/g," ").trim()).filter(Boolean);
}
function cleanLines(lines){
  return lines
    .map(s => String(s||"").replace(/\uFFFC/g,"").replace(/\u200B/g,"").replace(/\u2060/g,"").trim())
    .filter(Boolean)
    .filter(s => !/^早見\d*$/.test(s))
    .filter(s => s !== "節間成績")
    .filter(s => !["初日","2日目","3日目","4日目","5日目","最終日"].includes(s))
    .filter(s => !/^枠写真レーサー/.test(s));
}
function normalizeWide(s){
  return String(s||"")
    .replace(/Ｆ/g,"F").replace(/Ｌ/g,"L")
    .replace(/[ｆ]/g,"f").replace(/[ｌ]/g,"l")
    .replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0))
    .replace(/\s+/g,"")
    .toUpperCase();
}
function parsePercentLine(s){
  const m = String(s||"").match(/-?(?:\d+\.\d+|\.\d+|\d+)/);
  return m ? parseFloat(m[0]) : null;
}
function avg(arr){
  if(!arr.length) return 0;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}
function isClassLine(s){
  return /^(A1|A2|B1|B2)$/.test(normalizeWide(s));
}
function parseFormResults(block){
  const finishes = [];
  for(let i=0;i<block.length;i++){
    const cur = String(block[i]||"").trim();
    const prev = String(block[i-1]||"").trim();
    if(cur === "着" && /^[1-6]$/.test(prev)) finishes.push(parseInt(prev,10));
    const m = cur.match(/([1-6])\s*着$/);
    if(m) finishes.push(parseInt(m[1],10));
  }
  return finishes;
}
function findFLInfo(block){
  for(let i=0;i<block.length;i++){
    const n = normalizeWide(block[i]);
    const m = n.match(/^F(\d)L(\d)$/);
    if(m) return {fl:"F"+m[1]+"L"+m[2], after:i+1};
    const mf = n.match(/^F(\d)$/);
    const nl = normalizeWide(block[i+1] || "");
    const ml = nl.match(/^L(\d)$/);
    if(mf && ml) return {fl:"F"+mf[1]+"L"+ml[1], after:i+2};
  }
  return {fl:"F0L0", after:0};
}
function findNoIndexes(block){
  const idxs = [];
  for(let i=0;i<block.length;i++){
    if(/^No\.$/i.test(String(block[i]).trim())) idxs.push(i);
  }
  return idxs;
}
function convert(lines){
  const cleaned = cleanLines(lines);
  const debug = [];
  debug.push("cleaned lines: " + cleaned.length);

  const classIdxs = [];
  for(let i=0;i<cleaned.length;i++){
    if(isClassLine(cleaned[i])) classIdxs.push(i);
  }
  debug.push("class markers: " + classIdxs.length);
  debug.push(classIdxs.map(i => "["+i+"] " + (cleaned[i-1]||"") + " / " + cleaned[i]).join("\n"));

  if(classIdxs.length < 6) return {error:"A1/A2/B1/B2 の位置を6艇分見つけられませんでした。", debug};

  const rows = [];
  const forms = [];

  for(let b=0;b<6;b++){
    const classIdx = classIdxs[b];
    const start = Math.max(0, classIdx - 1);
    const end = b < 5 ? classIdxs[b+1] - 1 : cleaned.length;
    const block = cleaned.slice(start, end);

    const flInfo = findFLInfo(block);
    debug.push("\n["+(b+1)+"艇目 block head]\n" + block.slice(0,18).join(" | "));
    debug.push((b+1)+"艇目 FL=" + flInfo.fl + " after=" + flInfo.after);

    const after = flInfo.after;
    const st = parsePercentLine(block[after]) ?? 0;
    const predSt = parsePercentLine(block[after+1]) ?? st;
    const nationalWin = parsePercentLine(block[after+2]) ?? 0;
    const national2 = parsePercentLine(block[after+3]) ?? 0;
    const national3 = parsePercentLine(block[after+4]) ?? 0;
    const localWin = parsePercentLine(block[after+5]) ?? nationalWin;
    const local2 = parsePercentLine(block[after+6]) ?? 0;
    const local3 = parsePercentLine(block[after+7]) ?? 0;

    debug.push((b+1)+"艇目 core=" + JSON.stringify({st,predSt,nationalWin,national2,national3,localWin,local2,local3}));

    const noIdxs = findNoIndexes(block);
    if(noIdxs.length < 2) return {error:(b+1)+"艇目のモーター/ボート欄を見つけられません。", debug};

    const motor2 = parsePercentLine(block[noIdxs[0]+2]) ?? 0;
    const boat2 = parsePercentLine(block[noIdxs[1]+2]) ?? 0;

    const finishes = parseFormResults(block);
    const avgRank = finishes.length ? avg(finishes) : 0;
    const formText = finishes.slice(0,8).join(",");

    const f = flInfo.fl === "F0L0" ? "なし" : (flInfo.fl.startsWith("F1") ? "F1" : (flInfo.fl.startsWith("F2") ? "F2" : "なし"));

    rows.push([
      b+1, f,
      Number(st).toFixed(2),
      Number(nationalWin).toFixed(2),
      Number(motor2).toFixed(2),
      Number(st).toFixed(2),
      Number(boat2).toFixed(2),
      "0/0/0",
      Number(localWin).toFixed(2),
      Number(predSt || st).toFixed(2),
      Number(avgRank).toFixed(1)
    ].join(","));
    forms.push(formText || "抽出なし");
  }

  return {rows, forms, debug};
}

document.getElementById("run").addEventListener("click", () => {
  const parsed = convert(splitLines(document.getElementById("raw").value));
  document.getElementById("debug").textContent = (parsed.debug || []).join("\n");
  if(parsed.error){
    document.getElementById("status").innerHTML = '<span class="ng">整形失敗:</span> ' + parsed.error;
    document.getElementById("out").value = "";
    document.getElementById("forms").textContent = "結果待ち";
    return;
  }
  document.getElementById("status").innerHTML = '<span class="ok">整形成功</span>';
  document.getElementById("out").value =
    "艇,F,ST,勝率,モーター2連率,コース別平均ST,コース別2着内率,決まり手（差/捲/捲差）,コース別勝率,今節平均ST,平均スタート順\n\n" +
    parsed.rows.join("\n");
  document.getElementById("forms").textContent = parsed.forms.map((v,i)=> (i+1) + "号艇: " + v).join("\n");
});
</script>
</body>
</html>
