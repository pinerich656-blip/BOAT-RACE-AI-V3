
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE AI LITE 自動得点版</title>
<style>
body{font-family:-apple-system;background:#0b1220;color:#fff;margin:0;padding:10px}
.card{background:#111827;border-radius:14px;padding:12px;margin-bottom:10px}
input,button{width:100%;margin:4px 0;padding:10px;border-radius:10px;border:none}
button{background:#2563eb;color:#fff;font-weight:bold}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;margin:4px;background:#16a34a}
.warn{background:#dc2626}
</style>
</head>
<body>

<div class="card">
<div>入力（全国 / 展示 / ST）</div>
<div id="inputs"></div>
<button onclick="autoScore()">自動得点生成</button>
<button onclick="calc()">AI判定</button>
</div>

<div class="card">
<div>結果</div>
<div id="manshu"></div>
<div id="bets"></div>
</div>

<script>
let scores=[];

function make(){
 let html="";
 for(let i=1;i<=6;i++){
  html+=`
  <div>
    ${i}号艇
    <input id="rate${i}" placeholder="全国勝率">
    <input id="tenji${i}" placeholder="展示タイム">
    <input id="st${i}" placeholder="ST">
  </div>`;
 }
 document.getElementById("inputs").innerHTML=html;
}
make();

function autoScore(){
 scores=[];
 for(let i=1;i<=6;i++){
  let rate=+document.getElementById("rate"+i).value||0;
  let tenji=+document.getElementById("tenji"+i).value||0;
  let st=+document.getElementById("st"+i).value||0;

  let score = rate*10;

  if(tenji>0) score += (7-tenji)*5;
  if(st>0) score += (0.20-st)*50;

  scores.push({boat:i,score:score});
 }

 alert("得点生成しました");
}

function calc(){
 if(scores.length===0){alert("先に自動得点を押してください");return;}

 scores.sort((a,b)=>b.score-a.score);

 let diff = scores[0].score - scores[2].score;
 let level = diff<20?"特大警戒":diff<50?"警戒":"低";

 document.getElementById("manshu").innerHTML=
  `<span class="badge ${diff<20?"warn":""}">万舟:${level}</span>`;

 document.getElementById("bets").innerHTML=
  `${scores[0].boat}-${scores[1].boat}-${scores[2].boat}`;
}
</script>

</body>
</html>
