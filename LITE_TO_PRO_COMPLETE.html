
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LITE→PRO完全連携</title>
<style>
body{font-family:-apple-system;background:#0b1220;color:#fff;margin:0;padding:10px}
.card{background:#111827;border-radius:14px;padding:12px;margin-bottom:10px}
input,button{width:100%;margin:4px 0;padding:10px;border-radius:10px;border:none}
button{background:#2563eb;color:#fff;font-weight:bold}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;margin:4px;background:#16a34a}
.warn{background:#dc2626}
</style>
</head>
<body>

<div class="card">
<div>LITE入力（得点）</div>
<div id="inputs"></div>
<button onclick="calc()">LITE判定</button>
</div>

<div class="card">
<div>結果</div>
<div id="manshu"></div>
<div id="bets"></div>
<button onclick="toPro()">👉 PROへ自動入力</button>
</div>

<script>
let saved=null;

function make(){
 let html="";
 for(let i=1;i<=6;i++){
  html+=`<input id="r${i}" placeholder="${i}号艇 得点">`
 }
 document.getElementById("inputs").innerHTML=html;
}
make();

function calc(){
 let arr=[];
 for(let i=1;i<=6;i++){
  let v=+document.getElementById("r"+i).value||0;
  arr.push({boat:i,score:v});
 }
 arr.sort((a,b)=>b.score-a.score);

 saved=arr;

 let diff = arr[0].score - arr[2].score;
 let level = diff<5?"特大警戒":diff<10?"警戒":"低";

 document.getElementById("manshu").innerHTML=
  `<span class="badge ${diff<5?"warn":""}">万舟:${level}</span>`;

 document.getElementById("bets").innerHTML=
  `${arr[0].boat}-${arr[1].boat}-${arr[2].boat}`;
}

function toPro(){
 if(!saved){alert("先にLITE判定してください");return;}

 // URLにデータ付与
 let params = saved.map((x,i)=>`r${i+1}=${x.score}`).join("&");

 // pro.htmlへ遷移
 location.href = "pro.html?" + params;
}
</script>

</body>
</html>
