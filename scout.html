
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE AI SCOUT + 資金配分AI</title>
<style>
body{font-family:-apple-system;background:#0b1220;color:#fff;margin:0;padding:10px}
.card{background:#111827;border-radius:14px;padding:12px;margin-bottom:10px}
input,button{width:100%;margin:4px 0;padding:10px;border-radius:10px;border:none}
button{background:#2563eb;color:#fff;font-weight:bold}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;margin:4px}
.good{background:#16a34a}
.warn{background:#dc2626}
.gold{background:#f59e0b;color:#111}
</style>
</head>
<body>

<div class="card">
<div>レース入力（全国・展示・ST）</div>
<input id="raceName" placeholder="例: 住之江10R">
<div id="inputs"></div>
<button onclick="addRace()">追加</button>
</div>

<div class="card">
<div>勝負レース抽出</div>
<button onclick="scan()">抽出</button>
<div id="result"></div>
</div>

<div class="card">
<div>資金配分AI</div>
<input id="budget" placeholder="予算（例: 10000）">
<button onclick="allocate()">資金配分</button>
<div id="money"></div>
</div>

<script>
let races=[];

function make(){
 let html="";
 for(let i=1;i<=6;i++){
  html+=`<input id="r${i}" placeholder="${i}号艇 全国">`;
 }
 document.getElementById("inputs").innerHTML=html;
}
make();

function calcScores(){
 let arr=[];
 for(let i=1;i<=6;i++){
  let v=+document.getElementById("r"+i).value||0;
  arr.push({boat:i,score:v});
 }
 arr.sort((a,b)=>b.score-a.score);
 return arr;
}

function addRace(){
 let name=document.getElementById("raceName").value;
 let arr=calcScores();
 let diff=arr[0].score-arr[2].score;

 let level="見送り";
 if(diff>15) level="本線";
 if(diff<10) level="万舟";

 races.push({name,arr,level,diff});
 alert("追加");
}

function scan(){
 let html="";
 races.forEach(r=>{
  html+=`<div>
  <b>${r.name}</b>
  <span class="badge ${r.level=="万舟"?"warn":"good"}">${r.level}</span>
  本命:${r.arr[0].boat}
  </div>`;
 });
 document.getElementById("result").innerHTML=html;
}

function allocate(){
 let budget=+document.getElementById("budget").value||0;
 let html="";
 let targets=races.filter(r=>r.level!="見送り");

 if(targets.length==0){
  html="対象なし";
 }else{
  let per=Math.floor(budget/targets.length);
  targets.forEach(r=>{
    let weight=r.level=="万舟"?0.5:1;
    let money=Math.floor(per*weight);
    html+=`<div>${r.name} → ${money}円</div>`;
  });
 }
 document.getElementById("money").innerHTML=html;
}
</script>

</body>
</html>
