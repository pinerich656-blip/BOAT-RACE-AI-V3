
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE AI LITE AUTO LINK</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b1220;color:#fff;margin:0;padding:10px}
.card{background:#111827;border-radius:14px;padding:12px;margin-bottom:10px}
input,button{width:100%;margin:4px 0;padding:10px;border-radius:10px;border:none;box-sizing:border-box}
input{background:#020617;color:#fff}
button{background:#2563eb;color:#fff;font-weight:bold}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;margin:4px;background:#16a34a}
.warn{background:#dc2626}
.mid{background:#f59e0b;color:#111}
.linkbtn{background:#7c3aed}
.small{font-size:12px;opacity:.85;line-height:1.6}
</style>
</head>
<body>
<button onclick="goHome()">🏠 トップに戻る</
<div class="card">
  <div><b>LITE入力（全国 / 展示 / ST）</b></div>
  <div class="small">3項目だけ入れて、自動得点 → AI判定 → PROへ送れます。</div>
  <div id="inputs"></div>
  <button onclick="autoScore()">自動得点生成</button>
  <button onclick="calc()">AI判定</button>
</div>

<div class="card">
  <div><b>結果</b></div>
  <div id="scores" class="small">-</div>
  <div id="manshu"></div>
  <div id="bets"></div>
  <button class="linkbtn" onclick="toPro()">👉 PROへ自動入力</button>
</div>

<script>
let scoreData=[];

function make(){
  let html="";
  for(let i=1;i<=6;i++){
    html += `
      <div style="margin-top:8px">
        <div class="small">${i}号艇</div>
        <input id="rate${i}" inputmode="decimal" pattern="[0-9.]*" placeholder="全国勝率">
        <input id="tenji${i}" inputmode="decimal" pattern="[0-9.]*" placeholder="展示タイム">
        <input id="st${i}" inputmode="decimal" pattern="[0-9.]*" placeholder="ST">
      </div>`;
  }
  document.getElementById("inputs").innerHTML = html;
}
make();

function autoScore(){
  scoreData=[];
  for(let i=1;i<=6;i++){
    const rate=+document.getElementById("rate"+i).value||0;
    const tenji=+document.getElementById("tenji"+i).value||0;
    const st=+document.getElementById("st"+i).value||0;

    let score = rate*10;
    if(tenji>0) score += (7-tenji)*5;
    if(st>0) score += (0.20-st)*50;

    score = Math.round(score*10)/10;

    scoreData.push({
      boat:i,
      rate:rate,
      tenji:tenji,
      st:st,
      score:score
    });
  }

  document.getElementById("scores").innerHTML =
    scoreData.map(x=>`${x.boat}号艇: ${x.score}`).join("<br>");
}

function calc(){
  if(scoreData.length===0){
    alert("先に自動得点生成を押してください");
    return;
  }

  const arr=[...scoreData].sort((a,b)=>b.score-a.score);
  const diff = (arr[0].score - arr[2].score);

  let level="";
  let bets=[];

  if(diff < 20){
    level="特大警戒";
    bets=[
      `${arr[2].boat}-${arr[0].boat}-${arr[1].boat}`,
      `${arr[3].boat}-${arr[0].boat}-${arr[2].boat}`,
      `${arr[1].boat}-${arr[2].boat}-${arr[0].boat}`
    ];
  }else if(diff < 50){
    level="警戒";
    bets=[
      `${arr[0].boat}-${arr[2].boat}-${arr[1].boat}`,
      `${arr[1].boat}-${arr[0].boat}-${arr[2].boat}`
    ];
  }else{
    level="低";
    bets=[
      `${arr[0].boat}-${arr[1].boat}-${arr[2].boat}`,
      `${arr[0].boat}-${arr[2].boat}-${arr[1].boat}`
    ];
  }

  document.getElementById("manshu").innerHTML =
    `<span class="badge ${diff<20?"warn":diff<50?"mid":""}">万舟: ${level}</span>`;

  document.getElementById("bets").innerHTML =
    bets.map(b=>`<span class="badge">${b}</span>`).join("");
}

function toPro(){
  if(scoreData.length===0){
    alert("先に自動得点生成を押してください");
    return;
  }

  const params = new URLSearchParams();

  for(let i=1;i<=6;i++){
    const d = scoreData.find(x=>x.boat===i);
    if(!d) continue;

    // PRO側でそのまま使えるように全国勝率へ送る
    params.set("rate"+i, d.rate || "");
    // 参考用に展示/ST/自動得点も送る
    params.set("tenji"+i, d.tenji || "");
    params.set("st"+i, d.st || "");
    params.set("r"+i, d.score || "");
  }

  location.href = "pro.html?" + params.toString();
}
</script>
function goHome(){
  location.href = "index.html";
}
</body>
</html>
