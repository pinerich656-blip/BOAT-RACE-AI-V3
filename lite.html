
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOAT RACE AI COMPLETE</title>
<style>
body{font-family:-apple-system;background:#0b1220;color:#fff;margin:0;padding:10px}
.card{background:#111827;border-radius:14px;padding:12px;margin-bottom:10px}
input,button{width:100%;margin:4px 0;padding:10px;border-radius:10px;border:none}
input{background:#020617;color:#fff}
button{background:#2563eb;color:#fff;font-weight:bold}
.nav{position:sticky;top:0;z-index:10;background:#0b1220;padding-bottom:10px}
.row{display:flex;gap:6px}
.badge{display:inline-block;padding:6px 10px;border-radius:20px;margin:4px;background:#16a34a}
.warn{background:#dc2626}
.linkbtn{background:#7c3aed}
</style>
</head>
<body>

<div class="nav">
  <button onclick="goHome()">🏠 トップに戻る</button>
  <div class="row">
    <button onclick="prevRace()">⬅ 前</button>
    <button onclick="nextRace()">次 ➡</button>
  </div>
</div>

<div class="card">
  <div>LITE入力（全国 / 展示 / ST）</div>
  <div id="inputs"></div>
  <button onclick="autoScore()">自動得点</button>
  <button onclick="calc()">AI判定</button>
</div>

<div class="card">
  <div>結果</div>
  <div id="result"></div>
  <button class="linkbtn" onclick="toPro()">👉 PROへ</button>
</div>

<script>
let raceNum=1;
let scores=[];

function goHome(){
 location.href="index.html";
}

function make(){
 let html="";
 for(let i=1;i<=6;i++){
  html+=`
  <div>${i}号艇
  <input id="rate${i}" placeholder="全国">
  <input id="tenji${i}" placeholder="展示">
  <input id="st${i}" placeholder="ST">
  </div>`;
 }
 document.getElementById("inputs").innerHTML=html;
}
make();

function autoScore(){
 scores=[];
 for(let i=1;i<=6;i++){
  let r=+document.getElementById("rate"+i).value||0;
  let t=+document.getElementById("tenji"+i).value||0;
  let s=+document.getElementById("st"+i).value||0;

  let sc=r*10+(7-t)*5+(0.2-s)*50;
  scores.push({boat:i,score:sc});
 }
}

function calc(){
 scores.sort((a,b)=>b.score-a.score);
 document.getElementById("result").innerHTML=
  scores.map(x=>x.boat).join("-");
}

function toPro(){
 let params=new URLSearchParams();
 for(let i=1;i<=6;i++){
  params.set("rate"+i,document.getElementById("rate"+i).value);
 }
 location.href="pro.html?"+params.toString();
}

function save(){
 let data={};
 for(let i=1;i<=6;i++){
  data["rate"+i]=document.getElementById("rate"+i).value;
 }
 localStorage.setItem("race"+raceNum,JSON.stringify(data));
}

function load(){
 let d=localStorage.getItem("race"+raceNum);
 if(!d)return;
 d=JSON.parse(d);
 for(let i=1;i<=6;i++){
  document.getElementById("rate"+i).value=d["rate"+i]||"";
 }
}

function nextRace(){save();raceNum++;load();}
function prevRace(){if(raceNum>1){save();raceNum--;load();}}

window.onload=load;
</script>

</body>
</html>
