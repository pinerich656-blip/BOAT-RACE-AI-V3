<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BOAT RACE AI 完全版（実戦思考モデル）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#0b1220;color:#fff;font-family:sans-serif;padding:10px}
textarea,input,select,button{width:100%;margin:5px 0;padding:10px;border-radius:8px;border:none}
button{background:#2563eb;color:#fff;font-weight:bold}
.card{background:#121c33;padding:10px;border-radius:12px;margin-bottom:10px}
</style>
</head>
<body>

<div class="card">
<h2>実戦思考AI（強化版）</h2>
<textarea id="data" placeholder="整形データ貼付"></textarea>
<input id="entry" placeholder="進入 例:123/456">
<button onclick="run()">予想</button>
</div>

<div class="card" id="result">結果待ち</div>

<script>
function parse(){
  const lines=document.getElementById("data").value.trim().split("\n").slice(2);
  return lines.map(l=>{
    const d=l.split(",");
    return {
      boat:+d[0],
      st:+d[2],
      rate:+d[3],
      m2:+d[4],
      course2:+d[6]
    }
  });
}

function stability(b){
  return b.m2*0.6 + b.rate*2 + (0.2-b.st)*50;
}

function attack(b){
  return b.rate*3 + b.m2*0.5 + (0.2-b.st)*80;
}

function run(){
  const boats=parse();

  const one=boats.find(b=>b.boat==1);
  const two=boats.find(b=>b.boat==2);

  let inScore=one.rate*5 + one.m2*0.5 + (0.2-one.st)*60;
  let sashiScore=two.rate*4 + two.m2*0.4;

  let attackers=boats.filter(b=>b.boat>=3)
    .map(b=>({boat:b.boat,score:attack(b)}))
    .sort((a,b)=>b.score-a.score);

  let atk=attackers[0];

  let scenario="イン逃げ";
  if(sashiScore>inScore) scenario="差し";
  if(atk.score>inScore*1.1) scenario="まくり";

  let fixed;
  if(scenario=="イン逃げ") fixed=[1,2];
  else if(scenario=="差し") fixed=[2,1];
  else fixed=[atk.boat,1];

  let himo=boats.filter(b=>!fixed.includes(b.boat))
    .map(b=>({boat:b.boat,score:stability(b)}))
    .sort((a,b)=>b.score-a.score);

  document.getElementById("result").innerHTML=
    "展開："+scenario+"<br>"+
    "本線："+fixed[0]+"-"+fixed[1]+"-"+himo[0].boat+"<br>"+
    "対抗："+fixed[0]+"-"+fixed[1]+"-"+himo[1].boat+"<br>"+
    "穴："+fixed[0]+"-"+himo[0].boat+"-"+himo[1].boat;
}
</script>

</body>
</html>
