
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE AI PRO MAX 勝ち筋説明版 v5</title>
<style>
:root{
  --bg:#08101c; --line:#243a63; --text:#edf4ff; --muted:#9fb3d9;
  --blue:#2563eb; --cyan:#06b6d4; --green:#16a34a; --gold:#f59e0b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:
    radial-gradient(circle at top left,#16335f 0%,#08101c 42%),
    linear-gradient(180deg,#08101c,#091221);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{max-width:430px;margin:auto;padding:10px}
.card{
  background:linear-gradient(180deg,rgba(18,29,52,.98),rgba(11,20,36,.98));
  padding:14px;margin:10px 0;border-radius:16px;border:1px solid var(--line)
}
.header{
  padding:18px 14px 22px;
  background:linear-gradient(135deg,#0f172a,#1d4ed8 58%,#06b6d4);
  border-bottom-left-radius:24px;border-bottom-right-radius:24px;
  box-shadow:0 12px 26px rgba(0,0,0,.35);
  margin:-10px -10px 10px -10px;
}
.header h1{margin:0;font-size:24px}
.header p{margin:6px 0 0;font-size:12px;opacity:.94}
input,select,button{
  width:100%;padding:10px;margin-top:6px;border-radius:10px;border:none;box-sizing:border-box;
  font-size:16px
}
input,select{background:#020617;color:#fff}
button{background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;font-weight:800}
.grid{display:grid;grid-template-columns:40px repeat(5,1fr);gap:6px;margin-top:6px;align-items:center}
.cap{display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:900;height:40px}
.c1{background:#fff;color:#000}.c2{background:#000;color:#fff}.c3{background:#ef4444}.c4{background:#2563eb}.c5{background:#f59e0b;color:#000}.c6{background:#16a34a}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px;font-weight:800}
.good{background:#16a34a}.warn{background:#dc2626}.tip{background:#2563eb}.gold{background:#f59e0b;color:#111}.sub{background:#7c3aed}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.list{margin-top:10px}
.money{margin-top:10px;padding:10px;border-radius:12px;background:#0f172a}
.commentbox{margin-top:10px;padding:12px;border-radius:12px;background:#0f172a;border:1px solid #243352;line-height:1.7}
.section{font-size:14px;font-weight:800;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>BOAT RACE AI PRO MAX</h1>
    <p>強化版 / 勝ち筋説明 / 1マーク展開予想</p>
  </div>

  <div style="margin-top:8px">
    <button onclick="clearData()" style="background:#374151">全クリア</button>
  </div>

  <div class="card">
    <div class="section">基本設定</div>
    <select id="track">
      <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
      <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
      <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
      <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
      <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
    </select>
    <input id="budget" inputmode="numeric" placeholder="予算（例: 3000）">
    <div class="small">入力項目：全国勝率 / モーター2連対率 / 平均ST / 展示 / 級</div>
  </div>

  <div class="card">
    <div class="section">入力</div>
    <div class="grid">
      <div>艇</div><div>全国</div><div>M2</div><div>ST</div><div>展示</div><div>級</div>
    </div>
    <div id="inputs"></div>
  </div>

  <div class="card">
    <button onclick="runAI()">AI予想</button>
  </div>

  <div class="card">
    <div id="result">結果待ち</div>
  </div>
</div>

<script>
const TRACK_BIAS={
"桐生":{in:56,bias:[12,5,3,1,0,0]},"戸田":{in:48,bias:[7,9,7,5,0,0]},"江戸川":{in:43,bias:[4,9,10,8,0,0]},
"平和島":{in:51,bias:[9,6,4,3,0,0]},"多摩川":{in:54,bias:[10,6,4,2,0,0]},"浜名湖":{in:53,bias:[10,6,4,2,0,0]},
"蒲郡":{in:57,bias:[13,5,3,1,0,0]},"常滑":{in:56,bias:[12,5,3,1,0,0]},"津":{in:54,bias:[10,6,4,2,0,0]},
"三国":{in:55,bias:[11,6,3,2,0,0]},"びわこ":{in:53,bias:[10,6,4,2,0,0]},"住之江":{in:52,bias:[9,6,4,3,0,0]},
"尼崎":{in:55,bias:[11,6,3,2,0,0]},"鳴門":{in:57,bias:[13,5,3,1,0,0]},"丸亀":{in:58,bias:[14,5,3,1,0,0]},
"児島":{in:54,bias:[10,6,4,2,0,0]},"宮島":{in:55,bias:[11,6,3,2,0,0]},"徳山":{in:58,bias:[14,5,3,1,0,0]},
"下関":{in:57,bias:[13,5,3,1,0,0]},"若松":{in:56,bias:[12,5,3,1,0,0]},"芦屋":{in:58,bias:[14,5,3,1,0,0]},
"福岡":{in:55,bias:[11,6,3,2,0,0]},"唐津":{in:57,bias:[13,5,3,1,0,0]},"大村":{in:60,bias:[16,5,3,1,0,0]}
};

function makeInputs(){
  let html="";
  for(let i=1;i<=6;i++){
    html += `<div class="grid">
      <div class="cap c${i}">${i}</div>
      <input id="rate${i}" inputmode="decimal" pattern="[0-9.]*">
      <input id="m2${i}" inputmode="decimal" pattern="[0-9.]*">
      <input id="st${i}" inputmode="decimal" pattern="[0-9.]*">
      <input id="tenji${i}" inputmode="decimal" pattern="[0-9.]*">
      <select id="cls${i}"><option>A1</option><option>A2</option><option>B1</option><option>B2</option></select>
    </div>`;
  }
  document.getElementById("inputs").innerHTML=html;
}
function classBonus(c){return c==="A1"?12:c==="A2"?8:c==="B1"?4:0;}
function trackBias(track,boat){return (TRACK_BIAS[track]?.bias?.[boat-1])||0;}
function getInRate(track){return (TRACK_BIAS[track]?.in)||55;}

function runAI(){
  const track=document.getElementById("track").value;
  const budget=+document.getElementById("budget").value||0;
  let arr=[];
  for(let i=1;i<=6;i++){
    const rate=+document.getElementById("rate"+i).value||0;
    const m2=+document.getElementById("m2"+i).value||0;
    const st=+document.getElementById("st"+i).value||0;
    const tenji=+document.getElementById("tenji"+i).value||0;
    const cls=document.getElementById("cls"+i).value;
    let score=rate*10+m2*0.8+(st>0?(0.20-st)*40:0)+(tenji>0?(7-tenji)*10:0)+classBonus(cls)+trackBias(track,i);
    arr.push({boat:i,score,st,tenji,m2,rate,cls});
  }
  arr.sort((a,b)=>b.score-a.score);

  const fastST=arr.filter(x=>x.st>0&&x.st<=0.13);
  const topTenji=[...arr].filter(x=>x.tenji>0).sort((a,b)=>a.tenji-b.tenji);
  const topMotor=[...arr].sort((a,b)=>b.m2-a.m2);

  let scenario="イン逃げ";
  if(arr[0].boat!==1) scenario="波乱";
  if(fastST.length>=2 && ((topTenji[0] && (topTenji[0].boat===3 || topTenji[0].boat===4)) || (topMotor[0] && (topMotor[0].boat===3 || topMotor[0].boat===4)))) scenario="まくり・差し警戒";
  if(arr[0].boat===1 && getInRate(track)>=58 && (arr[0].st===0 || arr[0].st<=0.15)) scenario="イン逃げ濃厚";

  let diff=arr[0].score-arr[2].score;
  let manshu=0;
  if(diff<30) manshu+=35;
  if(arr[0].boat!==1) manshu+=20;
  if(fastST.length>=2) manshu+=15;
  if(topTenji.length>=2 && (topTenji[1].tenji-topTenji[0].tenji)>=0.04) manshu+=10;
  if(arr[0].boat===1 && getInRate(track)>=58) manshu-=10;
  manshu=Math.max(0,Math.min(100,manshu));

  const inRate=getInRate(track);

  let mainBets=[`${arr[0].boat}-${arr[1].boat}-${arr[2].boat}`,`${arr[0].boat}-${arr[2].boat}-${arr[1].boat}`,`${arr[1].boat}-${arr[0].boat}-${arr[2].boat}`];
  let subBets=[`${arr[1].boat}-${arr[2].boat}-${arr[0].boat}`,`${arr[0].boat}-${arr[1].boat}-${arr[3].boat}`,`${arr[0].boat}-${arr[3].boat}-${arr[1].boat}`];
  let holeBets=manshu>=55?[`${arr[2].boat}-${arr[0].boat}-${arr[1].boat}`,`${arr[3].boat}-${arr[0].boat}-${arr[2].boat}`]:[`${arr[0].boat}-${arr[2].boat}-${arr[3].boat}`];
  mainBets=[...new Set(mainBets)].slice(0,3);
  subBets=[...new Set(subBets)].slice(0,3);
  holeBets=[...new Set(holeBets)].slice(0,2);

  const totalUnits=mainBets.length*3+subBets.length*2+holeBets.length;
  const unit=totalUnits>0&&budget>0?Math.floor(budget/totalUnits):0;

  function renderBets(bets,cls,label,mult){
    return bets.map(b=>`<div class="badge ${cls}">${label} ${b}${budget>0?" / "+(unit*mult)+"円":""}</div>`).join("");
  }

  let markComment="";
  const one=arr.find(x=>x.boat===1);
  const two=arr.find(x=>x.boat===2);
  const four=arr.find(x=>x.boat===4);
  const six=arr.find(x=>x.boat===6);

  if(four && four.st>0 && four.st<=0.13) markComment += "④がカドから先制を狙いやすい。";
  if(one && one.st>=0.18) markComment += "①はスタートで後手を踏みやすく、包まれる可能性あり。";
  if(two && two.m2<20) markComment += "②は差し残しより連下評価。";
  if(six && six.m2>=35) markComment += "⑥は機力上位で展開突きの3着注意。";
  if(topTenji.length>0 && (topTenji[0].boat===3 || topTenji[0].boat===4)) markComment += "外寄りの展示気配が良く、1マークで攻め筋が出やすい。";
  if(markComment==="") markComment="イン主体の通常展開。";

  let winPath = "";
  if(four && four.st>0 && four.st<=0.13 && arr[0].boat!==4){
    winPath = `④が仕掛けて、${arr[0].boat}が展開を突く勝ち筋。`;
  } else if(arr[0].boat===1 && scenario.includes("イン")){
    winPath = "①が先マイして押し切る勝ち筋。";
  } else {
    winPath = `${arr[0].boat}号艇が総合力で押し切る形。`;
  }

  document.getElementById("result").innerHTML=`
    <h3>本命：${arr[0].boat}号艇</h3>
    <div class="badge good">展開：${scenario}</div>
    <div class="badge warn">万舟率：${manshu}%</div>
    <div class="badge gold">イン逃げ率：${inRate}%</div>
    <div class="small">BOAT RACE AI PRO MAX と同じデザインで、勝ち筋説明まで表示します。</div>
    <div class="commentbox"><b>1マーク展開予想：</b><br>${markComment}</div>
    <div class="commentbox"><b>勝ち筋の自動説明：</b><br>${winPath}</div>
    <div class="list">
      ${renderBets(mainBets,"good","本線",3)}
      ${renderBets(subBets,"sub","抑え",2)}
      ${renderBets(holeBets,"tip","穴",1)}
    </div>
    ${budget>0?`<div class="money small">予算 ${budget}円 / 1単位 ${unit}円</div>`:""}
  `;
}

function clearData(){
  document.getElementById("track").selectedIndex=0;
  document.getElementById("budget").value="";
  for(let i=1;i<=6;i++){
    document.getElementById("rate"+i).value="";
    document.getElementById("m2"+i).value="";
    document.getElementById("st"+i).value="";
    document.getElementById("tenji"+i).value="";
    document.getElementById("cls"+i).value="A1";
  }
  document.getElementById("result").innerHTML="結果待ち";
}
makeInputs();
</script>
</body>
</html>
