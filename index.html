<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOAT RACE AI v8.3 + v8 シンプル版（最終ロジック強化版）</title>
<style>
:root{
  --bg:#0b1220;--card:#121c33;--line:#243352;--text:#fff;--muted:#9fb0d1;
  --blue:#2563eb;--cyan:#06b6d4;--green:#16a34a;--gray:#374151;--violet:#7c3aed
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#08111f,#0d1730);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{max-width:1120px;margin:auto;padding:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
h1,h2,h3{margin:0}
.small{font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px}
textarea,input,select{width:100%;border:none;border-radius:12px;padding:12px;background:#08101d;color:#fff;border:1px solid #243352;font-size:14px}
textarea{min-height:150px;resize:vertical;line-height:1.55}
button{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:16px;font-weight:800;margin-top:6px;cursor:pointer}
.btn-green{background:linear-gradient(135deg,#0f9f6e,#22c55e)}
.btn-gray{background:var(--gray)}
.actions,.grid2,.grid3,.grid4{display:grid;gap:8px}
.actions,.grid2{grid-template-columns:1fr 1fr}
.grid3{grid-template-columns:1fr 1fr 1fr}
.grid4{grid-template-columns:1fr 1fr 1fr 1fr}
.row-grid{display:grid;grid-template-columns:42px 1fr 1fr 1fr;gap:8px;align-items:center;margin-top:8px}
.cap{display:flex;align-items:center;justify-content:center;height:48px;border-radius:10px;font-weight:900;font-size:18px}
.c1{background:#fff;color:#000}.c2{background:#000;color:#fff}.c3{background:#ef4444;color:#fff}.c4{background:#2563eb;color:#fff}.c5{background:#f59e0b;color:#000}.c6{background:#16a34a;color:#fff}
.badge{display:inline-block;padding:7px 12px;border-radius:999px;margin:4px 4px 0 0;font-weight:800;font-size:13px}
.good{background:#16a34a}.warn{background:#dc2626}.tip{background:#2563eb}.gold{background:#f59e0b;color:#111}.gray{background:#374151}.violet{background:#7c3aed}
.box{margin-top:10px;padding:12px;border-radius:12px;background:#0d1628;border:1px solid #22304d}
.mark-lane{position:relative;height:120px;border-radius:12px;background:linear-gradient(180deg,#0b1324,#111c32);overflow:hidden}
.lane-boat{position:absolute;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;box-shadow:0 6px 16px rgba(0,0,0,.35);transition:all .35s ease}
.table{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat{padding:10px;border-radius:10px;background:#0d1628;border:1px solid #22304d;font-size:13px}
pre{margin:0;white-space:pre-wrap;word-break:break-word;background:#08101d;border:1px solid #243352;border-radius:12px;padding:12px;font-size:14px;line-height:1.6}
label.switchline{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
input[type="checkbox"]{width:auto;transform:scale(1.1)}
.rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.rule-box{padding:12px;border-radius:12px;background:#08101d;border:1px solid #243352;font-size:13px;line-height:1.75}
.rule-title{font-weight:800;margin-bottom:6px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
@media (max-width: 760px){
  .grid2,.grid3,.grid4,.actions,.rule-grid{grid-template-columns:1fr}
  .table{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>BOAT RACE AI v8.3 + v8 シンプル版（最終ロジック強化版）</h1>
    <div class="small">整形済みデータ欄への直接反映、発動ルールの要約表示に加えて、2弱壁の2着残り判定と、1展示弱×4攻め強の4頭補正を入れた強化版です。</div>
  </div>

  <div class="card">
    <h3>0. 元データ貼り付け（boaters 生データ）</h3>
    <textarea id="rawData" placeholder="boaters の元データをそのまま貼り付け"></textarea>
    <div class="actions">
      <button id="btnFormat">整形して反映</button>
      <button id="btnFormatAndPredict" class="btn-green">整形して予想</button>
    </div>
    <div class="small">Fが1行型・2行型のどちらでも対応。全角Ｆ / 半角Fの両方に対応。</div>
  </div>

  <div class="card">
    <h3>① 整形済みデータ貼り付け</h3>
    <textarea id="pasteData" placeholder="艇,F,ST,勝率,モーター2連率,コース別平均ST,コース別2着内率,決まり手（差/捲/捲差）,コース別勝率,今節平均ST,平均スタート順"></textarea>
  </div>

  <div class="card">
    <h3>② 場・進入・オッズ</h3>
    <div class="grid2">
      <select id="track">
        <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
        <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
        <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
        <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
        <option>芦屋</option><option>福岡</option><option>唐津</option><option selected>大村</option>
      </select>
      <input id="entryPattern" type="text" placeholder="進入 例: 123/456 または 123/564">
    </div>
    <textarea id="oddsText" placeholder="オッズ入力（任意）
例
1-3-4,8.5
3-1-5,19.2"></textarea>
  </div>

  <div class="card">
    <h3>②.5 精度寄りオプション</h3>
    <div class="grid4">
      <label class="switchline"><input type="checkbox" id="optConservative" checked> 穴頭暴走を抑える</label>
      <label class="switchline"><input type="checkbox" id="optHeavyOne"> 1残り強め</label>
      <label class="switchline"><input type="checkbox" id="optOddsSafe" checked> オッズ過信を抑える</label>
      <label class="switchline"><input type="checkbox" id="optTightHimo" checked> 3着ヒモを安定寄り</label>
      <label class="switchline"><input type="checkbox" id="optAutoRuleReflect" checked> ⑤ルールを買い目へ自動反映</label>
    </div>
  </div>

  <div class="card">
    <h3>③ 展示・気配・今節成績</h3>
    <div class="small">今節成績はカンマ区切り。例：1,4,3,1</div>
    <div id="inputs"></div>
  </div>

  <div class="card">
    <div class="grid3">
      <button id="btnPredict">🚤 予測</button>
      <button id="btnSample" class="btn-green">サンプル</button>
      <button id="btnClear" class="btn-gray">全クリア</button>
    </div>
  </div>

  <div class="card">
    <div id="result">結果待ち</div>
    <div id="ruleHitBox" class="box" style="display:none"></div>
    <div id="scoreBox" class="table" style="display:none"></div>
    <div id="markView" class="box" style="display:none">
      <h3 style="margin-bottom:10px;">1マーク展開イメージ</h3>
      <div class="mark-lane">
        <div id="lane1" class="lane-boat c1">1</div>
        <div id="lane2" class="lane-boat c2">2</div>
        <div id="lane3" class="lane-boat c3">3</div>
        <div id="lane4" class="lane-boat c4">4</div>
        <div id="lane5" class="lane-boat c5">5</div>
        <div id="lane6" class="lane-boat c6">6</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>④ v8 シンプル版</h3>
    <div id="simpleResult" class="box">結果待ち</div>
  </div>
</div>

<script>
const TRACK_BIAS={"桐生":{in:10,sashi:2,makuri:-2,himo:1},"戸田":{in:-5,sashi:8,makuri:6,himo:4},"江戸川":{in:-8,sashi:6,makuri:10,himo:5},"平和島":{in:-3,sashi:5,makuri:5,himo:3},"多摩川":{in:6,sashi:2,makuri:-2,himo:1},"浜名湖":{in:5,sashi:3,makuri:0,himo:2},"蒲郡":{in:10,sashi:2,makuri:-2,himo:1},"常滑":{in:8,sashi:3,makuri:0,himo:1},"津":{in:5,sashi:3,makuri:2,himo:2},"三国":{in:6,sashi:2,makuri:0,himo:1},"びわこ":{in:5,sashi:3,makuri:2,himo:2},"住之江":{in:4,sashi:4,makuri:3,himo:3},"尼崎":{in:7,sashi:3,makuri:1,himo:2},"鳴門":{in:10,sashi:2,makuri:-2,himo:1},"丸亀":{in:10,sashi:2,makuri:-2,himo:1},"児島":{in:5,sashi:4,makuri:3,himo:3},"宮島":{in:7,sashi:3,makuri:1,himo:2},"徳山":{in:10,sashi:2,makuri:-2,himo:1},"下関":{in:9,sashi:2,makuri:-1,himo:1},"若松":{in:8,sashi:3,makuri:0,himo:2},"芦屋":{in:10,sashi:2,makuri:-2,himo:1},"福岡":{in:7,sashi:3,makuri:1,himo:2},"唐津":{in:9,sashi:2,makuri:-1,himo:1},"大村":{in:12,sashi:1,makuri:-3,himo:1}};
let trackEl,entryPatternEl,oddsTextEl,pasteDataEl,resultEl,scoreBoxEl,markViewEl,simpleResultEl,rawDataEl,ruleHitBoxEl;
let optConservative,optHeavyOne,optOddsSafe,optTightHimo,optAutoRuleReflect;

function makeInputs(){ let html=''; for(let i=1;i<=6;i++){ html+=`<div class="row-grid"><div class="cap c${i}">${i}</div><input id="tenji${i}" type="text" inputmode="decimal" placeholder="展示"><select id="demo${i}"><option value="0">普通</option><option value="6">良</option><option value="-6">弱</option></select><input id="form${i}" type="text" placeholder="今節成績 例:1,4,3,1"></div>`; } document.getElementById("inputs").innerHTML=html; }
function splitLines(text){ return text.split(/\r?\n/).map(s=>s.replace(/\u00A0/g," ").trim()).filter(Boolean); }
function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
function parseData(){ const raw=pasteDataEl.value.trim(); if(!raw) return []; let lines=splitLines(raw); if(lines[0]&&lines[0].includes("艇")) lines=lines.slice(1); return lines.map(line=>{ const d=line.split(",").map(x=>x.trim()); if(d.length<11) return null; const k=(d[7]||"0/0/0").split("/").map(v=>parseFloat(v)||0); return {boat:+d[0],f:d[1],st:+d[2]||0,rate:+d[3]||0,m2:+d[4]||0,courseST:+d[5]||0,course2:+d[6]||0,sashi:k[0]||0,makuri:k[1]||0,makurizashi:k[2]||0,courseWin:+d[8]||0,sessionST:+d[9]||0,avgRank:+d[10]||0}; }).filter(Boolean).sort((a,b)=>a.boat-b.boat); }
function parseEntry(){ const raw=(entryPatternEl.value||"").trim(); if(!raw) return null; const p=raw.split("/"); if(p.length!==2) return null; const inList=p[0].replace(/[^1-6]/g,"").split("").map(Number).filter(Boolean); const outList=p[1].replace(/[^1-6]/g,"").split("").map(Number).filter(Boolean); const merged=inList.concat(outList); if(merged.length!==6) return null; if(new Set(merged).size!==6) return null; const posMap={}; merged.forEach((b,i)=>posMap[b]=i+1); const dashStart=inList.length+1; return {inList,outList,merged,posMap,dashStart,kado:merged[dashStart-1]||null}; }
function parseOdds(){ const raw=(oddsTextEl.value||"").trim(); if(!raw) return {}; const map={}; raw.split(/\n/).map(x=>x.trim()).filter(Boolean).forEach(line=>{ const p=line.split(","); if(p.length<2) return; const key=p[0].trim(), val=parseFloat(p[1].trim()); if(key && !isNaN(val)) map[key]=val; }); return map; }
function fPenalty(f){ if(f==="F1") return -8; if(f==="F2") return -15; return 0; }
function stPower(st){ return st>0 ? (0.2-st)*120 : 0; }
function tenjiPower(t){ return t>0 ? (7-t)*18 : 0; }
function getTenji(i){ const v=parseFloat(document.getElementById("tenji"+i).value); return isNaN(v)?0:v; }
function getDemo(i){ const v=parseFloat(document.getElementById("demo"+i).value); return isNaN(v)?0:v; }
function getOptions(){ return {conservative:optConservative.checked,heavyOne:optHeavyOne.checked,oddsSafe:optOddsSafe.checked,tightHimo:optTightHimo.checked,autoRuleReflect:optAutoRuleReflect.checked}; }
function parseForm(str){ const arr=(str||"").split(/[,\s/]+/).map(x=>parseInt(x,10)).filter(v=>!isNaN(v)); if(arr.length===0) return {score:0,stable:0,text:"なし",bad:0}; let score=0, stable=0, bad=0; arr.forEach(v=>{ if(v===1) score+=10; else if(v===2) score+=7; else if(v===3) score+=4; else if(v===4) score+=1; else if(v>=5) score-=3; }); for(let i=1;i<arr.length;i++) if(Math.abs(arr[i]-arr[i-1])<=1) stable++; arr.forEach(v=>{ if(v>=5) bad++; }); score += stable*1.2; score -= bad*1.5; return {score,stable,text:arr.join("-"),bad}; }
function getBoatStyle(b){ let score=0; if(b.st<=0.13) score+=3; else if(b.st>=0.18) score-=2; if(b.m2>=40) score+=2; if(b.rate>=6.0) score+=2; if(b.makuri>=2) score+=3; if(b.makurizashi>=1) score+=2; if(b.fPen<0) score-=3; let label="普通"; if(score>=6) label="攻め"; else if(score>=2) label="差し寄り"; else if(score<=-1) label="慎重"; return {score,label}; }
function weakIn(one,entry){ return one.st>0.15 || one.rate<5.5 || one.m2<33 || one.fPen<0 || (entry&&entry.posMap[1]!==1); }
function wallScore(two){ let sc=two.rate*3+two.m2*0.2+stPower(two.st)*0.4+two.form.score*0.9+two.sashi*2+two.demo; if(two.fPen<0) sc-=12; return sc; }
function isWeakWall(two,entry){ let sc=wallScore(two); if(entry&&entry.posMap[2]&&entry.posMap[2]>2) sc-=15; return sc<35; }
function isBlocked(attacker,boats,entry){ const pos=entry&&entry.posMap[attacker.boat]?entry.posMap[attacker.boat]:attacker.boat; if(pos<=2) return false; const ahead=boats.filter(b=>{ const p=entry&&entry.posMap[b.boat]?entry.posMap[b.boat]:b.boat; return p>=2&&p<pos; }); for(const b of ahead) if(b.rate>attacker.rate||b.m2>attacker.m2||b.course2>attacker.course2) return true; return false; }
function twoStayScore(two,one,three){ let s=0; if(two.st<=0.16) s+=10; if(two.rate>=5) s+=8; if(two.form.score>=10) s+=8; if(two.demo>0) s+=4; if(three&&three.makuri>=2) s+=6; if(one.rate<6) s+=6; if(two.fPen<0) s-=10; return s; }
function outsideStableScore(b){ let s=0; if(b.m2>=38) s+=10; if(b.st<=0.17) s+=6; if(b.course2>=30) s+=6; if(b.form.score>=8) s+=8; if(b.avgRank>0&&b.avgRank<=3.5) s+=4; if(b.fPen<0) s-=8; return s; }
function oneRemainScore(one,two,attackers,bias,opts){ let s=0; if(one.course2>=70) s+=20; if(one.courseWin>=45) s+=16; if(one.st<=0.16) s+=10; if(one.st<=0.14) s+=6; if(one.tenji>0&&one.tenji<=6.90) s+=6; if(one.demo>=0) s+=4; if(one.form.text!=="なし"&&one.form.score>=0) s+=6; if(one.fPen<0) s-=6; if(one.m2<28) s-=6; if(one.form.bad>=2) s-=6; if(two&&two.rate<6) s+=8; if(two&&two.sashi<3) s+=6; const top=attackers[0]; if(top){ if(top.raw.makuri===0) s+=12; if(top.score<80) s+=10; if(top.laneNo>=5) s+=10; } s+=Math.max(0,bias.in); if(opts.heavyOne) s+=8; return s; }
function courseRealityPenalty(b,entry){ if(!entry) return 0; const pos=entry.posMap[b.boat]; if(pos===6) return -30; if(pos===5) return -18; if(pos===4) return -6; return 0; }
function applyStRankBoost(boats){ const stSorted=[...boats].sort((a,b)=>a.st-b.st); const stRank={}; stSorted.forEach((b,i)=>{stRank[b.boat]=i+1;}); boats.forEach(b=>{ if(stRank[b.boat]===1) b.stBoost=20; else if(stRank[b.boat]===2) b.stBoost=10; else b.stBoost=0; }); return {stSorted,stRank}; }
function headSuppressionPenalty(b,laneNo,entry,opts){ let p=0; if(!opts.conservative) return 0; if(laneNo>=5) p+=10; if(laneNo===6) p+=6; if(b.makuri===0) p+=10; if(b.rate<5.2) p+=8; if(b.m2<35) p+=6; if(b.st>0.16) p+=8; if(b.form.bad>=2) p+=5; if(b.fPen<0) p+=5; if(entry&&entry.posMap[b.boat]>=5&&b.course2<10) p+=6; return p; }
function attackScore(b,laneNo,bias,entry,weakWallFlag,opts){ const style=getBoatStyle(b); let lane=0; if(laneNo===4) lane=2; if(laneNo===5) lane=5; if(laneNo===6) lane=7; let sc=b.rate*5.8+b.m2*0.55+stPower(b.st)+tenjiPower(b.tenji)+b.demo+b.fPen+b.course2*0.15+b.makuri*3.2+b.makurizashi*2.4+style.score*2+bias.makuri+lane+b.form.score*0.85+(b.stBoost||0)+courseRealityPenalty(b,entry); if(entry){ const pos=entry.posMap[b.boat]; if(pos>=entry.dashStart) sc+=5; if(b.boat===entry.kado) sc+=12; if(pos>=entry.dashStart&&b.st<=0.14) sc+=8; } if(weakWallFlag) sc+=12; if(b.makuri===0&&b.makurizashi===0&&b.courseWin<5) sc-=15; if(b.makuri===0) sc-=12; if(b.makurizashi>=1&&b.makuri===0) sc-=6; sc -= headSuppressionPenalty(b,laneNo,entry,opts); return sc; }
function isAttackFail(attacker,one,two){ let f=0; if(attacker.makuri<1) f+=2; if(attacker.makurizashi<1) f+=2; if(attacker.st>0.16) f+=2; if(attacker.m2<35) f+=2; if(two.rate>5.5) f+=2; if(two.m2>30) f+=2; if(one.course2>60) f+=2; if(one.st<=0.16) f+=1; if(attacker.makuri===0) f+=3; return f; }
function stabilityScore(b,scenario,attacker,bias,entry,opts){ let sc=b.m2*0.85+b.rate*4.4+stPower(b.st)*0.35+tenjiPower(b.tenji)*0.45+b.demo+b.fPen+b.course2*0.28+b.courseWin*0.15+b.form.score*0.95+b.form.stable*1.2+outsideStableScore(b); if(b.m2>=40) sc+=14; if(b.st<=0.15) sc+=6; if(b.avgRank>0&&b.avgRank<=3.5) sc+=4; if(b.fPen<0) sc-=10; if(scenario==="イン逃げ"){ if(b.boat===3) sc+=10; if(b.boat>=5&&b.m2>=38) sc+=12; } else if(scenario==="差し"){ if(b.boat===1) sc+=18; if(b.boat>=5&&b.m2>=38) sc+=15; } else if(scenario==="まくり未遂"){ if(b.boat===1) sc+=22; if(b.boat===2) sc+=8; if(b.boat>=5&&b.m2>=35) sc+=14; } else { if(b.boat===1) sc+=16; if(b.boat===2) sc+=7; if(b.boat>=5&&b.m2>=38) sc+=16; } if(entry&&entry.posMap[b.boat]>=entry.dashStart) sc+=4; if(attacker===b.boat) sc-=999; sc+=bias.himo||0; if(opts.tightHimo){ if(b.boat>=5&&b.course2<12) sc-=8; if(b.form.bad>=2) sc-=8; if(b.st>0.18) sc-=6; } return sc; }
function confidenceLabel(scenario,attackFail,oneRemain,bestScore,inEscape,sashi,makuri){ let c=55; if(scenario==="イン逃げ") c+=10; if(scenario==="差し") c+=6; if(attackFail>=6) c-=10; if(oneRemain>=35) c+=5; c += clamp((Math.max(inEscape,sashi,makuri)-Math.min(inEscape,sashi,makuri))/8,0,12); c += clamp((bestScore-80)/4,-8,8); c=Math.round(clamp(c,35,88)); if(c>=75) return {score:c,label:"高め"}; if(c>=60) return {score:c,label:"中位"}; return {score:c,label:"やや低め"}; }
function getSuji(attacker){ if(attacker===3) return 4; if(attacker===4) return 5; if(attacker===5) return 6; return null; }
function analyzeTwoCourseRisk(two,boats,entry){ const reasons=[]; let count=0; if(two.st>=0.16){ count++; reasons.push("ST 0.16以上"); } if(two.f!=="なし"){ count++; reasons.push("F持ち"); } if((two.tenji>0&&two.tenji>=6.95)||two.demo<0){ count++; reasons.push("展示弱い"); } if(two.rate<5.5){ count++; reasons.push("勝率低い"); } const outsideAttackers=boats.filter(b=>b.boat>=3).filter(b=>{ const pos=entry&&entry.posMap[b.boat]?entry.posMap[b.boat]:b.boat; return pos>=3&&((b.makuri+b.makurizashi)>=2||(b.st<=0.15&&b.m2>=38)); }); if(outsideAttackers.length){ count++; reasons.push("外に攻め艇"); } let rule="通常"; if(count>=3) rule="2固定禁止"; else if(count>=2) rule="1-3-2入れる"; return {count,reasons,rule,outsideAttackers}; }
function choose3or5Fallback(boats,entry,twoRisk,threeRemain,fiveKado){
  const b3 = boats.find(b=>b.boat===3);
  const b5 = boats.find(b=>b.boat===5);
  const hasAttacker = twoRisk.outsideAttackers.length > 0;
  let base = hasAttacker ? "5" : "3";

  resultEl.innerHTML=`<span class="badge gold">${track}</span><span class="badge tip">展開タイプ：${scenario}</span><span class="badge good">主役：${attacker}号艇</span><span class="badge violet">信頼度：${conf.label} (${conf.score})</span><div class="box"><b>1マーク通過予想：</b> ${order}<br><b>イン逃げ指数：</b> ${inEscape.toFixed(1)}<br><b>差し圧：</b> ${sashi.toFixed(1)}<br><b>攻め圧：</b> ${makuri.toFixed(1)}<br><b>攻め不成立指数：</b> ${attackFail}<br><b>2残り指数：</b> ${twoStay.toFixed(1)}<br><b>1残り指数：</b> ${oneRemain.toFixed(1)}<br><b>2コースチェック：</b> ${twoRisk.count}項目 (${twoRisk.rule})<br><b>2コース警戒理由：</b> ${riskText}<br><b>2が飛びそうな時：</b> ${fallbackText}<br><b>3が残る条件：</b> ${threeRemainText}<br><b>5が来るカド展開：</b> ${fiveKadoText}<br><b>2着残り判定：</b> ${twoSecondText}<br><b>1弱×4頭判定：</b> ${oneWeakFourText}<br><b>自動反映：</b> ${opts.autoRuleReflect?"ON":"OFF"}<br><b>イン弱体：</b> ${weakInFlag?"あり":"なし"}<br><b>2弱壁：</b> ${weakWallFlag?"あり":"なし"}<br><b>コメント：</b> ${comment}</div>`;
  const oddsMap=parseOdds();
  let rawTickets=buildTickets(fixed,himos,scenario,attacker,two,twoStay,oneRemain,attackFail,twoRisk,fallback.pick,threeRemainFinal,fiveKadoFinal,twoSecondRemain,oneWeakFourHead);
  rawTickets=applyRuleReflectionToTickets(rawTickets,{twoRisk,fallbackPick:fallback.pick,threeRemain:threeRemainFinal,fiveKado:fiveKadoFinal,opts,scenario,twoSecondRemain,oneWeakFourHead});
  const tickets=rankTickets(rawTickets,oddsMap,opts).slice(0,10);
  resultEl.innerHTML += `<div class="box"><b>推奨買い目</b><br>${tickets.map(t=>`${t.bet} / ${t.note}${t.odds?` / オッズ ${t.odds}`:""} / 評価 ${t.ev.toFixed(1)}`).join("<br>")}</div>`;
  scoreBoxEl.style.display="grid";
  scoreBoxEl.innerHTML=boats.map(b=>{ const stable=b.boat>=4?outsideStableScore(b):0; return `<div class="stat"><b>${b.boat}号艇</b><br>勝率:${b.rate}<br>M2:${b.m2}<br>ST:${b.st}<br>展示:${b.tenji||0}<br>今節:${b.form.text}<br>今節点:${b.form.score.toFixed(1)}<br>気配:${b.style.label}<br>${b.boat>=4?`外安定:${stable.toFixed(1)}`:""}</div>`; }).join("");
  const hitSummary = buildRuleHitSummary(twoRisk, threeRemainFinal, fiveKadoFinal, twoSecondRemain, oneWeakFourHead, fallback, opts, isTwoStrong);
  ruleHitBoxEl.style.display = "block";
  ruleHitBoxEl.innerHTML = `<b>発動ルール要約</b><br>${hitSummary.join("<br>")}`;

}
function runV8Simple(){
  const boats=parseData();
  if(boats.length<6){ simpleResultEl.innerHTML="結果待ち"; return; }
  boats.forEach((b,i)=>{ const n=i+1; b.tenji=getTenji(n); b.demo=getDemo(n); b.fPen=fPenalty(b.f); b.form=parseForm(document.getElementById("form"+n).value); });
  const two=boats[1], entry=parseEntry();
  const attack=boats.slice(2).map(x=>({n:x.boat,sc:x.rate*5+x.m2*0.5+(0.2-x.st)*100+x.makuri*5-(x.boat>=5?8:0)})).sort((a,b)=>b.sc-a.sc);
  const top=attack[0];
  let attackFail=0;
  if(top.sc<70) attackFail+=2;
  if(top.sc<60) attackFail+=2;
  if(two.rate>5.5) attackFail+=2;
  const twoRisk=analyzeTwoCourseRisk(two,boats,entry), threeRemain=analyzeThreeRemain(boats,entry,twoRisk,attackFail), fiveKado=analyzeFiveKado(boats,entry,twoRisk), fallback=choose3or5Fallback(boats,entry,twoRisk,threeRemain,fiveKado);
  let order=attackFail>=6?`1-${top.n}-2`:`${top.n}-2-1`;
  if(twoRisk.count>=2) order=fallback.pick==="5"?`1-5-2`:`1-3-2`;
  const buy=[order,`${top.n}-2-1`,`1-3-2`,`1-5-2`];
  simpleResultEl.innerHTML=`<b>v8 シンプル版</b><br>1マーク通過予想： ${order}<br>攻め不成立指数： ${attackFail}<br>2コースチェック： ${twoRisk.count}項目 / ${twoRisk.rule}<br>2飛び時の本線寄り： ${fallback.pick}<br>3残り判定： ${threeRemain.rule}<br>5カド判定： ${fiveKado.rule}<br><br><b>簡易買い目</b><br>${buy.join("<br>")}`;
}
function isNum(s){ return /^-?\d+(\.\d+)?$/.test(s); }
function find(lines,keyword,start=0){ for(let i=start;i<lines.length;i++) if(lines[i].includes(keyword)) return i; return -1; }
function findAny(lines,keywords,start=0){ for(let i=start;i<lines.length;i++) if(keywords.some(k=>lines[i].includes(k))) return i; return -1; }
function numsBetween(lines,start,end){ const out=[]; for(let i=start+1;i<end;i++) if(isNum(lines[i])) out.push(parseFloat(lines[i])); return out; }
function textsBetween(lines,start,end,pattern){ const out=[]; for(let i=start+1;i<end;i++) if(pattern.test(lines[i])) out.push(lines[i]); return out; }
function pairField(nums,field){ const arr=[]; for(let i=0;i+1<nums.length;i+=2) arr.push(field===0?nums[i]:nums[i+1]); return arr; }
function rev(a){ return a.slice().reverse(); }
function parseF(lines){ let idx=find(lines,"Ｆ"); if(idx<0) idx=find(lines,"F"); if(idx<0) return Array(6).fill("なし"); const upper=lines.slice(0,idx), candidates=[]; for(let i=0;i<upper.length;i++){ const s=upper[i]; if(s==="-"){ candidates.push("-"); continue; } if(/^\d+\s*\((未|済)\)$/.test(s)){ candidates.push(s.replace(/\s+/g,"")); continue; } if(/^\d+$/.test(s)&&i+1<upper.length&&/^\((未|済)\)$/.test(upper[i+1])){ candidates.push(s+upper[i+1]); i++; } } const last6=candidates.slice(-6); while(last6.length<6) last6.unshift("-"); return last6.reverse().map(v=>{ if(v==="-"||v==="") return "なし"; const m=v.match(/^(\d+)\((未|済)\)$/); return m?"F"+m[1]:"なし"; }); }

function parsePercentLine(s){
  const m = String(s||"").match(/-?\d+(?:\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}
function avg(arr){
  if(!arr || !arr.length) return 0;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}
function fillFormsFromParsed(parsed){
  if(!parsed || !parsed.forms) return;
  for(let i=1;i<=6;i++){
    const el=document.getElementById("form"+i);
    if(el) el.value = parsed.forms[i-1] || "";
  }
}
function tryConvertBoatersRaw(lines){
  const idxF=findAny(lines,["Ｆ","F"]),
        idxNational=findAny(lines,["全国勝率"]),
        idxLocal=findAny(lines,["当地勝率"]),
        idxMotor=findAny(lines,["モーター","モーター2連率"],Math.max(0,idxLocal+1)),
        idxAvgST=findAny(lines,["平均ST"]),
        idxSession=findAny(lines,["今節平均ST"]),
        idxCourseData=findAny(lines,["コース別データ"]),
        idxCourseWin=findAny(lines,["勝率"],Math.max(0,idxCourseData+1)),
        idxKimari=findAny(lines,["決まり手"],Math.max(0,idxCourseWin+1)),
        idxCourse2Label=findAny(lines,["2着内率"],Math.max(0,idxKimari+1));

  if([idxF,idxNational,idxLocal,idxMotor,idxAvgST,idxSession,idxCourseData,idxCourseWin,idxKimari].some(x=>x<0)){
    return null;
  }

  const fVals=parseF(lines), natNums=[];
  for(let i=idxNational-1;i>=0&&natNums.length<12;i--){
    if(isNum(lines[i])) natNums.push(parseFloat(lines[i]));
    if(lines[i].includes("Ｌ")||lines[i].includes("L")) break;
  }

  const wins=pairField(natNums.reverse(),0).reverse(),
        motorNums=numsBetween(lines,idxLocal,idxMotor),
        motor2=rev(pairField(motorNums,1));

  const avgNums=[];
  for(let i=idxAvgST-1;i>=0&&avgNums.length<6;i--){
    if(isNum(lines[i])) avgNums.push(parseFloat(lines[i]));
    if(lines[i].includes("スタートデータ")) break;
  }

  const avgST=avgNums,
        sessionNums=numsBetween(lines,idxAvgST,idxSession),
        sessionST=rev(pairField(sessionNums,0)),
        avgStartRank=rev(pairField(sessionNums,1));

  const beforeWinNums=numsBetween(lines,idxCourseData,idxKimari),
        courseST=rev(pairField(beforeWinNums.slice(0,12),0)),
        courseWin=rev(beforeWinNums.slice(12,18));

  const kimariEnd=idxCourse2Label>-1?idxCourse2Label:lines.length,
        kimari=rev(textsBetween(lines,idxCourseWin,kimariEnd,/^\d+\/\d+\/\d+$/).slice(0,6));

  const course2Raw=[];
  for(let i=idxKimari+1;i<lines.length&&course2Raw.length<6;i++){
    if(isNum(lines[i])) course2Raw.push(parseFloat(lines[i]));
  }
  const course2=course2Raw.reverse();

  const counts={F:fVals.length,勝率:wins.length,M2:motor2.length,平均ST:avgST.length,今節平均ST:sessionST.length,平均スタート順:avgStartRank.length,コース別平均ST:courseST.length,コース別勝率:courseWin.length,決まり手:kimari.length,コース別2着内率:course2.length};

  if(Math.min(...Object.values(counts)) < 6){
    return null;
  }

  const rows=[];
  for(let i=0;i<6;i++){
    rows.push([
      i+1,fVals[i],Number(avgST[i]||0).toFixed(2),Number(wins[i]||0).toFixed(2),Number(motor2[i]||0).toFixed(2),Number(courseST[i]||0).toFixed(2),Number(course2[i]||0).toFixed(2),kimari[i]||"0/0/0",Number(courseWin[i]||0).toFixed(2),Number(sessionST[i]||0).toFixed(2),Number(avgStartRank[i]||0).toFixed(1)
    ].join(","));
  }

  return { source: "boaters", rows, forms: Array(6).fill("") };
}
function tryConvertVerticalRaceText(lines){
  const norm = s => String(s||"")
    .replace(/Ｆ/g,"F")
    .replace(/Ｌ/g,"L")
    .replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0))
    .replace(/\s+/g,"")
    .toUpperCase();

  const fIdxs = [];
  for(let i=0;i<lines.length;i++){
    if(/^F\dL\d$/.test(norm(lines[i]))) fIdxs.push(i);
  }
  if(fIdxs.length < 6) return null;

  const rowsByBoat = Array(6).fill("");
  const formsByBoat = Array(6).fill("");

  for(let b=0;b<6;b++){
    const s = fIdxs[b];
    const e = b < 5 ? fIdxs[b+1] : lines.length;
    const block = lines.slice(s, e);

    const fRaw = norm(block[0]);
    const st = parsePercentLine(block[1]) ?? 0;
    const nationalWin = parsePercentLine(block[3]) ?? 0;
    const localWin = parsePercentLine(block[6]) ?? nationalWin;

    const noIdxs = [];
    for(let i=0;i<block.length;i++){
      if(/^No\.$/i.test(block[i])) noIdxs.push(i);
    }
    if(noIdxs.length < 2) return null;

    const motor2 = parsePercentLine(block[noIdxs[0]+2]) ?? 0;
    const boat2 = parsePercentLine(block[noIdxs[1]+2]) ?? 0;

    const finishes = [];
    for(let i=1;i<block.length;i++){
      if(block[i] === "着" && /^\d+$/.test(block[i-1]||"")){
        const v = parseInt(block[i-1], 10);
        if(v >= 1 && v <= 6) finishes.push(v);
      }
    }

    const avgRank = finishes.length ? avg(finishes) : 0;
    const formText = finishes.slice(0,8).join(",");
    const f = fRaw === "F0L0" ? "なし" : (fRaw.startsWith("F1") ? "F1" : (fRaw.startsWith("F2") ? "F2" : "なし"));
    const boat = b + 1;

    rowsByBoat[boat-1] = [
      boat,
      f,
      Number(st || 0).toFixed(2),
      Number(nationalWin || 0).toFixed(2),
      Number(motor2 || 0).toFixed(2),
      Number(st || 0).toFixed(2),
      Number(boat2 || 0).toFixed(2),
      "0/0/0",
      Number(localWin || 0).toFixed(2),
      Number(st || 0).toFixed(2),
      Number(avgRank || 0).toFixed(1)
    ].join(",");

    formsByBoat[boat-1] = formText;
  }

  if(rowsByBoat.some(x=>!x)) return null;
  return { source: "vertical", rows: rowsByBoat, forms: formsByBoat };
}

function convertRawToFormatted(){
  const lines = splitLines(rawDataEl.value);
  const target = document.getElementById("pasteData");
  if(lines.length < 20){
    if(target) target.value = "";
    resultEl.innerHTML = "元データ量が足りません。";
    return null;
  }
  try{
    let parsed = tryConvertVerticalRaceText(lines);
    if(!parsed || !parsed.rows || parsed.rows.length < 6){
      if(target) target.value = "";
      resultEl.innerHTML = "元データの読み取りに失敗しました。縦並び出走表形式を貼ってください。";
      return null;
    }

    const result = `艇,F,ST,勝率,モーター2連率,コース別平均ST,コース別2着内率,決まり手（差/捲/捲差）,コース別勝率,今節平均ST,平均スタート順\n\n${parsed.rows.join("\n")}`;

    if(target){
      target.value = result;
      target.textContent = result;
      target.dispatchEvent(new Event("input", {bubbles:true}));
      target.dispatchEvent(new Event("change", {bubbles:true}));
      target.focus();
      target.scrollIntoView({behavior:"smooth", block:"center"});
    }

    fillFormsFromParsed(parsed);
    resultEl.innerHTML = parsed.source === "vertical"
      ? "縦並び元データを解析して整形済みデータ欄へ反映しました。今節成績も自動入力しました。"
      : "整形済みデータ欄へ反映しました。";
    return result;
  }catch(e){
    if(target) target.value = "";
    resultEl.innerHTML = "整形中にエラーが出ました。貼り付けた元データの先頭から最終艇までまとめて入っているか確認してください。";
    return null;
  }
}
