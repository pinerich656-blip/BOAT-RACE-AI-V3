<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOAT RACE AI v17 精度UP版</title>
<style>
:root{
  --bg:#0b1220;--card:#121c33;--line:#243352;--text:#fff;--muted:#9fb0d1;
  --blue:#2563eb;--cyan:#06b6d4;--green:#16a34a;--gray:#374151;--red:#dc2626;--gold:#f59e0b
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#08111f,#0d1730);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{max-width:1120px;margin:auto;padding:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
h1,h2,h3{margin:0 0 8px}
.small{font-size:12px;color:var(--muted);line-height:1.7}
textarea,input,select{width:100%;border:none;border-radius:12px;padding:12px;background:#08101d;color:#fff;border:1px solid #243352;font-size:14px}
textarea{min-height:140px;resize:vertical;line-height:1.55}
button{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:16px;font-weight:800;margin-top:6px;cursor:pointer}
.btn-green{background:linear-gradient(135deg,#0f9f6e,#22c55e)}
.btn-gray{background:var(--gray)}
.actions,.grid2,.grid3,.grid4{display:grid;gap:8px}
.actions,.grid2{grid-template-columns:1fr 1fr}
.grid3{grid-template-columns:1fr 1fr 1fr}
.grid4{grid-template-columns:1fr 1fr 1fr 1fr}
.row-grid{display:grid;grid-template-columns:42px 1fr 1fr 1fr;gap:8px;align-items:center;margin-top:8px}
.cap{display:flex;align-items:center;justify-content:center;height:48px;border-radius:10px;font-weight:900;font-size:18px}
.c1{background:#fff;color:#000}.c2{background:#000;color:#fff}.c3{background:#ef4444;color:#fff}.c4{background:#2563eb;color:#fff}.c5{background:#f59e0b;color:#000}.c6{background:#16a34a;color:#fff}
.badge{display:inline-block;padding:7px 12px;border-radius:999px;margin:4px 4px 0 0;font-weight:800;font-size:13px}
.good{background:#16a34a}.warn{background:#dc2626}.tip{background:#2563eb}.gold{background:#f59e0b;color:#111}.gray{background:#374151}
.box{margin-top:10px;padding:12px;border-radius:12px;background:#0d1628;border:1px solid #22304d}
.table{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat{padding:10px;border-radius:10px;background:#0d1628;border:1px solid #22304d;font-size:13px}
.list{background:#08101d;border:1px solid #243352;border-radius:12px;padding:12px;white-space:pre-wrap;word-break:break-word}
.hit{color:#86efac;font-weight:700}
.miss{color:#fca5a5;font-weight:700}
thead th, tbody td{padding:6px 8px;border-bottom:1px solid #243352;font-size:13px;text-align:left}
table{width:100%;border-collapse:collapse}
@media (max-width: 760px){
  .grid2,.grid3,.grid4,.actions{grid-template-columns:1fr}
  .table{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>BOAT RACE AI v17 精度UP版</h1>
    <div class="small">縦並び元データの整形・予想・結果記録・回収率管理に加えて、展開ブレ抑制・オッズ歪み評価・買い目品質評価を入れた精度UP版です。</div>
  </div>

  <div class="card">
    <h3>0. 元データ貼り付け</h3>
    <textarea id="rawData" placeholder="縦並びの元データをそのまま貼り付け"></textarea>
    <div class="actions">
      <button id="btnFormat">整形して反映</button>
      <button id="btnFormatAndPredict" class="btn-green">整形して予想</button>
    </div>
  </div>

  <div class="card">
    <h3>① 整形済みデータ</h3>
    <textarea id="pasteData" placeholder="整形結果がここに入ります"></textarea>
  </div>

  <div class="card">
    <h3>② 場・進入・風・オッズ</h3>
    <div class="grid2">
      <select id="track">
        <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
        <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
        <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
        <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
        <option>芦屋</option><option>福岡</option><option>唐津</option><option selected>大村</option>
      </select>
      <input id="entryPattern" type="text" placeholder="進入 例: 123/456">
    </div>
    <div class="grid2" style="margin-top:8px">
      <select id="windType">
        <option value="なし" selected>風向きなし</option>
        <option value="向かい">向かい風</option>
        <option value="追い">追い風</option>
        <option value="横">横風</option>
      </select>
      <input id="windPower" type="text" inputmode="decimal" placeholder="風速 例: 4">
    </div>
    <textarea id="oddsText" placeholder="オッズ入力（任意）&#10;例&#10;1-5-4,12.4&#10;5-1-4,18.6"></textarea>
  </div>

  <div class="card">
    <h3>③ 展示・今節成績</h3>
    <div id="inputs"></div>
  </div>

  <div class="card">
    <div class="grid3">
      <button id="btnPredict">🚤 予測</button>
      <button id="btnSample" class="btn-green">サンプル</button>
      <button id="btnClear" class="btn-gray">全クリア</button>
    </div>
  </div>

  <div class="card">
    <div id="result">結果待ち</div>
    <div id="scoreBox" class="table" style="display:none"></div>
  </div>

  <div class="card">
    <h3>④ 結果登録</h3>
    <div class="grid4">
      <input id="actualOrder" placeholder="実着順 例: 1-5-4">
      <input id="betPerTicket" type="number" inputmode="numeric" placeholder="1点金額 例: 100" value="100">
      <input id="hitOdds" type="number" inputmode="decimal" placeholder="的中オッズ 例: 12.4">
      <input id="raceMemo" placeholder="メモ 例: 5カド効いた">
    </div>
    <div class="actions">
      <button id="btnSaveResult" class="btn-green">結果保存</button>
      <button id="btnResetHistory" class="btn-gray">履歴リセット</button>
    </div>
    <div class="small">払戻は「1点金額 × 的中オッズ」で計算します。オッズ未入力なら払戻0で保存します。</div>
  </div>

  <div class="card">
    <h3>⑤ 成績ダッシュボード</h3>
    <div id="statsBox" class="table"></div>
  </div>

  <div class="card">
    <h3>⑥ 履歴</h3>
    <div id="historyTable" class="list">まだ記録がありません。</div>
  </div>
</div>

<script>
const TRACK_BIAS={"桐生":{in:10,makuri:-2},"戸田":{in:-5,makuri:6},"江戸川":{in:-8,makuri:10},"平和島":{in:-3,makuri:5},"多摩川":{in:6,makuri:-2},"浜名湖":{in:5,makuri:0},"蒲郡":{in:10,makuri:-2},"常滑":{in:8,makuri:0},"津":{in:5,makuri:2},"三国":{in:6,makuri:0},"びわこ":{in:5,makuri:2},"住之江":{in:4,makuri:3},"尼崎":{in:7,makuri:1},"鳴門":{in:10,makuri:-2},"丸亀":{in:10,makuri:-2},"児島":{in:5,makuri:3},"宮島":{in:7,makuri:1},"徳山":{in:10,makuri:-2},"下関":{in:9,makuri:-1},"若松":{in:8,makuri:0},"芦屋":{in:10,makuri:-2},"福岡":{in:7,makuri:1},"唐津":{in:9,makuri:-1},"大村":{in:12,makuri:-3}};
let trackEl,entryPatternEl,oddsTextEl,pasteDataEl,resultEl,scoreBoxEl,rawDataEl,windTypeEl,windPowerEl;
let lastPrediction = null;
const STORAGE_KEY = "boat_race_ai_v16_history";

function makeInputs(){
  let html='';
  for(let i=1;i<=6;i++){
    html += `<div class="row-grid">
      <div class="cap c${i}">${i}</div>
      <input id="tenji${i}" type="text" inputmode="decimal" placeholder="展示">
      <select id="demo${i}"><option value="0">普通</option><option value="6">良</option><option value="-6">弱</option></select>
      <input id="form${i}" type="text" placeholder="今節成績 例: 5,1,6,5,1,3,6">
    </div>`;
  }
  document.getElementById("inputs").innerHTML = html;
}
function splitLines(text){ return String(text||"").split(/\r?\n/).map(s=>s.replace(/\u00A0/g," ").trim()).filter(Boolean); }
function parsePercentLine(s){
  const m = String(s||"").match(/-?(?:\d+\.\d+|\.\d+|\d+)/);
  return m ? parseFloat(m[0]) : null;
}
function avg(arr){ return arr && arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function cleanLines(lines){
  return lines
    .map(s => String(s||"").replace(/\uFFFC/g,"").replace(/\u200B/g,"").replace(/\u2060/g,"").trim())
    .filter(Boolean)
    .filter(s => !/^早見\d*$/.test(s))
    .filter(s => s !== "節間成績")
    .filter(s => !["初日","2日目","3日目","4日目","5日目","最終日","枠","写真","レーサー","年齢 / 体重","出身","支部","F","L","平均ST","予測ST","全国勝率","2連率","3連率","当地勝率","モーターNo.","ボートNo."].includes(s))
    .filter(s => !/^枠写真レーサー/.test(s));
}
function normalizeWide(s){
  return String(s||"")
    .replace(/Ｆ/g,"F").replace(/Ｌ/g,"L")
    .replace(/[ｆ]/g,"f").replace(/[ｌ]/g,"l")
    .replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0))
    .replace(/\s+/g,"")
    .toUpperCase();
}
function isClassLine(s){ return /^(A1|A2|B1|B2)$/.test(normalizeWide(s)); }
function findFLInfo(block){
  for(let i=0;i<block.length;i++){
    const n = normalizeWide(block[i]);
    let m = n.match(/^F(\d)L(\d)$/);
    if(m) return {fl:`F${m[1]}L${m[2]}`, after:i+1};
    const mf = n.match(/^F(\d)$/), nl = normalizeWide(block[i+1]||""), ml = nl.match(/^L(\d)$/);
    if(mf && ml) return {fl:`F${mf[1]}L${ml[1]}`, after:i+2};
  }
  return {fl:"F0L0", after:0};
}
function findNoIndexes(block){
  const idxs=[]; for(let i=0;i<block.length;i++) if(/^No\.$/i.test(String(block[i]).trim())) idxs.push(i);
  return idxs;
}
function parseFormResults(block){
  const finishes = [];
  for(let i=0;i<block.length;i++){
    const cur = String(block[i]||"").trim();
    const prev = String(block[i-1]||"").trim();
    if(
      cur === "F" || cur === "Ｆ" ||
      cur === "L" || cur === "Ｌ" ||
      cur === "落" || cur === "失" || cur === "転" || cur === "欠" ||
      !cur
    ) continue;
    if(cur === "着" && /^[1-6]$/.test(prev)){ finishes.push(parseInt(prev,10)); continue; }
    const m = cur.match(/([1-6])\s*着$/);
    if(m) finishes.push(parseInt(m[1],10));
  }
  return finishes;
}
function fillFormsFromParsed(parsed){
  if(!parsed || !parsed.forms) return;
  for(let i=1;i<=6;i++) document.getElementById("form"+i).value = parsed.forms[i-1] || "";
}
function convertRawToFormatted(){
  const lines = splitLines(rawDataEl.value);
  if(lines.length < 20){ resultEl.innerHTML = "元データ量が足りません。"; return null; }
  const cleaned = cleanLines(lines);
  const classIdxs = [];
  for(let i=0;i<cleaned.length;i++) if(isClassLine(cleaned[i])) classIdxs.push(i);
  if(classIdxs.length < 6){
    resultEl.innerHTML = "元データの読み取りに失敗しました。縦並び出走表を先頭から最終艇までまとめて貼ってください。";
    return null;
  }
  const rows = [], forms = [];
  for(let b=0;b<6;b++){
    const classIdx = classIdxs[b];
    const start = Math.max(0, classIdx - 1);
    const end = b < 5 ? classIdxs[b+1] - 1 : cleaned.length;
    const block = cleaned.slice(start, end);
    const flInfo = findFLInfo(block);
    const after = flInfo.after;
    const st = parsePercentLine(block[after]) ?? 0;
    const predSt = parsePercentLine(block[after+1]) ?? st;
    const nationalWin = parsePercentLine(block[after+2]) ?? 0;
    const localWin = parsePercentLine(block[after+5]) ?? nationalWin;
    const noIdxs = findNoIndexes(block);
    if(noIdxs.length < 2){ resultEl.innerHTML = `${b+1}艇目のモーター/ボート欄を見つけられません。`; return null; }
    const motor2 = parsePercentLine(block[noIdxs[0]+2]) ?? 0;
    const boat2 = parsePercentLine(block[noIdxs[1]+2]) ?? 0;
    const finishes = parseFormResults(block);
    const avgRank = finishes.length ? avg(finishes) : 0;
    const formText = finishes.slice(0,8).join(",");
    const f = flInfo.fl === "F0L0" ? "なし" : (flInfo.fl.startsWith("F1") ? "F1" : (flInfo.fl.startsWith("F2") ? "F2" : "なし"));
    rows.push([b+1, f, st.toFixed(2), nationalWin.toFixed(2), motor2.toFixed(2), st.toFixed(2), boat2.toFixed(2), "0/0/0", localWin.toFixed(2), predSt.toFixed(2), avgRank.toFixed(1)].join(","));
    forms.push(formText);
  }
  const result = `艇,F,ST,勝率,モーター2連率,コース別平均ST,コース別2着内率,決まり手（差/捲/捲差）,コース別勝率,今節平均ST,平均スタート順\n\n${rows.join("\n")}`;
  pasteDataEl.value = result;
  fillFormsFromParsed({forms});
  resultEl.innerHTML = "整形済みデータ欄へ反映しました。";
  return result;
}
function parseData(){
  const raw = pasteDataEl.value.trim();
  if(!raw) return [];
  let lines = splitLines(raw);
  if(lines[0] && lines[0].includes("艇")) lines = lines.slice(1);
  return lines.map(line=>{
    const d=line.split(",").map(x=>x.trim());
    if(d.length < 11) return null;
    return {
      boat:+d[0], f:d[1], st:+d[2]||0, rate:+d[3]||0, m2:+d[4]||0,
      courseST:+d[5]||0, course2:+d[6]||0, courseWin:+d[8]||0,
      sessionST:+d[9]||0, avgRank:+d[10]||0
    };
  }).filter(Boolean).sort((a,b)=>a.boat-b.boat);
}
function parseEntry(){
  const raw=(entryPatternEl.value||"").trim(); if(!raw) return null;
  const p=raw.split("/"); if(p.length!==2) return null;
  const inList=p[0].replace(/[^1-6]/g,"").split("").map(Number).filter(Boolean);
  const outList=p[1].replace(/[^1-6]/g,"").split("").map(Number).filter(Boolean);
  const merged=inList.concat(outList); if(merged.length!==6 || new Set(merged).size!==6) return null;
  const posMap={}; merged.forEach((b,i)=>posMap[b]=i+1);
  const dashStart=inList.length+1;
  return {inList,outList,merged,posMap,dashStart,kado:merged[dashStart-1]||null};
}
function parseOdds(){
  const raw=(oddsTextEl.value||"").trim(); if(!raw) return {};
  const map={}; raw.split(/\n/).map(x=>x.trim()).filter(Boolean).forEach(line=>{
    const p=line.split(","); if(p.length<2) return;
    const key=p[0].trim(), val=parseFloat(p[1].trim());
    if(key && !isNaN(val)) map[key]=val;
  }); return map;
}
function parseForm(str){
  const arr=(str||"").split(/[,\s/]+/).map(x=>parseInt(x,10)).filter(v=>!isNaN(v));
  if(arr.length===0) return {score:0,text:"なし",bad:0};
  let score=0,bad=0;
  arr.forEach(v=>{ if(v===1) score+=10; else if(v===2) score+=7; else if(v===3) score+=4; else if(v===4) score+=1; else if(v>=5){ score-=3; bad++; } });
  return {score,text:arr.join("-"),bad};
}
function getTenji(i){ const v=parseFloat(document.getElementById("tenji"+i).value); return isNaN(v)?0:v; }
function getDemo(i){ const v=parseFloat(document.getElementById("demo"+i).value); return isNaN(v)?0:v; }
function getWind(){
  const type = windTypeEl ? windTypeEl.value : "なし";
  const power = windPowerEl ? (parseFloat(windPowerEl.value)||0) : 0;
  return {type, power};
}
function windEffect(type, power){
  const effect={in:0,makuri:0};
  if(!type || !power || type==="なし") return effect;
  if(type==="向かい") effect.in += power*2;
  else if(type==="追い") effect.makuri += power*2;
  else if(type==="横"){ effect.makuri += power; effect.in -= power; }
  return effect;
}
function tenjiBoost(b, entry){
  const t=b.tenji||0; let s=0; if(!t) return 0;
  if(t<=6.70) s+=15; else if(t<=6.75) s+=10; else if(t<=6.80) s+=5; else if(t<=6.90) s+=0; else if(t<=7.00) s-=5; else s-=10;
  if(b.boat===1){ if(t>=6.90) s-=15; if(t<=6.75) s+=10; }
  if(entry && entry.kado===b.boat && t<=6.75) s+=12;
  if(b.boat>=5 && t<=6.75) s+=10;
  return s;
}
function calcWallRisk(two){
  let risk=0;
  if(two.st>=0.16) risk+=2;
  if(two.f==="F1") risk+=2;
  if(two.rate<6.0) risk+=2;
  if(two.courseWin<6.0) risk+=2;
  if(two.m2<25) risk+=2;
  if(two.avgRank>=4.0) risk+=1;
  return risk;
}
function calcAttackScore(b, entry){
  let s=0;
  if(b.st<=0.13) s+=4; else if(b.st<=0.15) s+=2;
  if(b.rate>=7.0) s+=4; else if(b.rate>=6.5) s+=2;
  if(b.courseWin>=6.5) s+=4; else if(b.courseWin>=5.8) s+=2;
  if(b.m2>=35) s+=3; else if(b.m2>=25) s+=1;
  if(b.avgRank<=3.0) s+=3; else if(b.avgRank<=3.8) s+=1;
  if(b.f==="F1") s-=3;
  s += tenjiBoost(b, entry);
  if(entry && entry.kado===5 && b.boat===5) s+=15;
  if(entry && entry.posMap && entry.posMap[3] <= 2 && b.boat===3) s+=10;
  return s;
}
function isRaceStable(inEscape, attackPower, wallRisk){
  const gap = Math.abs(inEscape - attackPower);
  return gap >= 8 || wallRisk >= 5;
}
function oddsBoost(odds){
  if(!odds) return 1;
  if(odds >= 10 && odds <= 25) return 1.25;
  if(odds > 25) return 1.1;
  if(odds < 5) return 0.7;
  return 1;
}
function qualityScore(ticket){
  let score = 0;
  const note = ticket.note || "";
  if(note.includes("本線")) score += 20;
  if(note.includes("押さえ")) score += 8;
  if(note.includes("逆転")) score += 5;
  if(note.includes("外攻め警戒")) score += 6;
  if(note.includes("頭注意")) score += 4;
  if(note.includes("穴")) score -= 10;
  return score;
}
function rankTickets(tickets, oddsMap){
  return tickets.map(t=>{
    const odds = oddsMap[t.bet]||0;
    let ev = t.base;
    if(odds>0) ev = t.base * Math.pow(Math.min(odds,40), 0.82);
    ev = ev * oddsBoost(odds);
    ev += qualityScore(t);
    if(/^5-1-/.test(t.bet)) ev += 18;
    if(/^1-5-/.test(t.bet)) ev += 14;
    if(/^6-1-/.test(t.bet)) ev += 8;
    return {...t, odds, ev};
  }).sort((a,b)=>b.ev-a.ev);
}
function addTicket(arr, bet, base, note){
  const p=bet.split("-").map(Number);
  if(new Set(p).size!==3) return;
  if(arr.some(x=>x.bet===bet)) return;
  arr.push({bet,base,note});
}
function getStakePlan(ranked, betPerTicket){
  const top = ranked.slice(0,5);
  const weights = [1.6, 1.3, 1.1, 1.0, 0.8];
  return top.map((t, idx)=>{
    const stake = Math.round((betPerTicket || 100) * weights[idx]);
    return {...t, stake};
  });
}
function runPrediction(){
  const boats = parseData();
  if(boats.length<6){ resultEl.innerHTML = "整形済みデータを6艇分入れてください。"; scoreBoxEl.style.display="none"; return; }
  const entry = parseEntry();
  if(entryPatternEl.value.trim() && !entry){ resultEl.innerHTML = "進入パターンの形式が不正です。例: 123/456"; scoreBoxEl.style.display="none"; return; }
  boats.forEach((b,i)=>{ const n=i+1; b.tenji=getTenji(n); b.demo=getDemo(n); b.form=parseForm(document.getElementById("form"+n).value); });
  const track = trackEl.value;
  const bias = TRACK_BIAS[track]||{in:0,makuri:0};
  const wind=getWind(), windAdj=windEffect(wind.type, wind.power);
  const one=boats.find(b=>b.boat===1), two=boats.find(b=>b.boat===2);
  const wallRisk = calcWallRisk(two);
  const weakWall = wallRisk >= 5;
  const attackers = boats.filter(b=>b.boat>=4).map(b=>({boat:b.boat,score:calcAttackScore(b,entry),raw:b})).sort((a,b)=>b.score-a.score);
  const bestAttacker = attackers[0] || null;

  let inEscape = one.rate*8 + one.m2*0.5 + one.courseWin*0.9 + one.form.score*0.8 + tenjiBoost(one,entry) + bias.in + windAdj.in;
  if(entry && entry.posMap[1] !== 1) inEscape -= 25;
  if(one.f==="F1") inEscape -= 8;

  let attackPower = (bestAttacker?bestAttacker.score:0) + bias.makuri + windAdj.makuri;
  const stableRace = isRaceStable(inEscape, attackPower, wallRisk);
  let scenario = "イン逃げ";
  if(entry && entry.posMap && entry.posMap[1] !== 1) scenario = "差し";
  else if(weakWall && bestAttacker && bestAttacker.score >= 8) scenario = inEscape >= attackPower ? "まくり未遂" : "まくり差し";
  else if(wind.type==="追い" && wind.power>=4 && bestAttacker && bestAttacker.score>=7) scenario = "まくり差し";

  let fixed;
  if(scenario==="イン逃げ") fixed=[1,2];
  else if(scenario==="差し") fixed=[2,1];
  else if(scenario==="まくり未遂") fixed=[1,bestAttacker?bestAttacker.boat:5];
  else fixed=[bestAttacker?bestAttacker.boat:5,1];

  let himos = boats.filter(b=>!fixed.includes(b.boat)).map(b=>{
    let score = b.rate*4 + b.courseWin*2 + b.m2*0.4 + (0.22-b.st)*20 + b.form.score*0.8 + tenjiBoost(b,entry);
    if(b.boat===1 && !fixed.includes(1)) score += 10;
    if(weakWall && bestAttacker && b.boat===bestAttacker.boat) score += 12;
    return {boat:b.boat, score};
  }).sort((a,b)=>b.score-a.score);

  const tickets=[];
  addTicket(tickets, `${fixed[0]}-${fixed[1]}-${himos[0].boat}`, 100, "本線");
  addTicket(tickets, `${fixed[0]}-${fixed[1]}-${himos[1].boat}`, 94, "本線");
  addTicket(tickets, `${fixed[0]}-${himos[0].boat}-${fixed[1]}`, 88, "押さえ");
  addTicket(tickets, `${fixed[1]}-${fixed[0]}-${himos[0].boat}`, 82, "逆転");
  if(bestAttacker){
    addTicket(tickets, `1-${bestAttacker.boat}-${himos[0].boat}`, 90, "外攻め警戒");
    addTicket(tickets, `${bestAttacker.boat}-1-${himos[0].boat}`, 92, "頭注意");
  }
  if(weakWall){
    addTicket(tickets, `1-5-4`, 90, "2弱壁");
    addTicket(tickets, `5-1-4`, 92, "2弱壁");
    addTicket(tickets, `1-5-6`, 86, "2弱壁");
  }
  if(one.tenji>=6.90){
    addTicket(tickets, `5-1-4`, 96, "1展示弱");
    addTicket(tickets, `5-1-6`, 90, "1展示弱");
  }
  const oddsMap = parseOdds();
  let ranked = rankTickets(tickets, oddsMap);
  if(!stableRace){
    ranked = ranked.filter(t => (t.note||"").includes("本線") || (t.note||"").includes("押さえ")).slice(0,4);
  }else{
    ranked = ranked.slice(0,6);
  }
  const order = `${fixed[0]}-${fixed[1]}-${himos[0].boat}`;
  const betPerTicket = parseInt(document.getElementById("betPerTicket").value, 10) || 100;
  const stakePlan = getStakePlan(ranked, betPerTicket);

  lastPrediction = {
    ts: new Date().toLocaleString("ja-JP"),
    track, scenario, order, wallRisk,
    bestAttacker: bestAttacker ? `${bestAttacker.boat}号艇 (${bestAttacker.score})` : "なし",
    tickets: ranked,
    stakePlan,
    baseStake: betPerTicket
  };

  resultEl.innerHTML = `<span class="badge gold">${track}</span><span class="badge tip">展開タイプ：${scenario}</span><span class="badge good">主役：${bestAttacker?bestAttacker.boat:1}号艇</span>${stableRace?'<span class="badge good">買い寄り</span>':'<span class="badge warn">見送り注意</span>'}<div class="box"><b>1マーク通過予想：</b> ${order}<br><b>2弱壁リスク：</b> ${wallRisk}<br><b>外攻め最上位：</b> ${bestAttacker?`${bestAttacker.boat}号艇 (${bestAttacker.score})`:"なし"}<br><b>風：</b> ${wind.type} ${wind.power||0}m<br><b>イン逃げ指数：</b> ${inEscape.toFixed(1)}<br><b>外攻め指数：</b> ${attackPower.toFixed(1)}<br><b>展開安定度：</b> ${stableRace?'安定':'不安定'}${!stableRace?'（点数絞り推奨）':''}</div><div class="box"><b>推奨買い目</b><br>${ranked.map(t=>`${t.bet} / ${t.note}${t.odds?` / オッズ ${t.odds}`:""} / 評価 ${t.ev.toFixed(1)}`).join("<br>")}</div><div class="box"><b>資金配分案</b><br>${stakePlan.map(t=>`${t.bet} / ${t.stake}円`).join("<br>")}</div>`;

  scoreBoxEl.style.display="grid";
  scoreBoxEl.innerHTML = boats.map(b=>`<div class="stat"><b>${b.boat}号艇</b><br>勝率:${b.rate}<br>当地:${b.courseWin}<br>M2:${b.m2}<br>ST:${b.st}<br>展示:${b.tenji||0}<br>今節:${b.form.text}<br>平均順:${b.avgRank}</div>`).join("");
}
function loadHistory(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  }catch(e){
    return [];
  }
}
function saveHistory(items){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}
function updateDashboard(){
  const items = loadHistory();
  const total = items.length;
  const hits = items.filter(x=>x.hit).length;
  const hitRate = total ? (hits/total*100).toFixed(1) : "0.0";
  const totalBet = items.reduce((s,x)=>s + (x.totalBet||0), 0);
  const totalReturn = items.reduce((s,x)=>s + (x.returnAmount||0), 0);
  const roi = totalBet ? ((totalReturn/totalBet)*100).toFixed(1) : "0.0";
  const profit = totalReturn - totalBet;

  document.getElementById("statsBox").innerHTML = `
    <div class="stat"><b>記録件数</b><br>${total}</div>
    <div class="stat"><b>的中数</b><br>${hits}</div>
    <div class="stat"><b>的中率</b><br>${hitRate}%</div>
    <div class="stat"><b>総購入</b><br>${totalBet.toLocaleString()}円</div>
    <div class="stat"><b>総払戻</b><br>${totalReturn.toLocaleString()}円</div>
    <div class="stat"><b>回収率</b><br>${roi}%</div>
    <div class="stat"><b>収支</b><br>${profit.toLocaleString()}円</div>
  `;

  if(!items.length){
    document.getElementById("historyTable").innerHTML = "まだ記録がありません。";
    return;
  }

  const rows = items.slice().reverse().map(item=>{
    const cls = item.hit ? "hit" : "miss";
    return `<tr>
      <td>${item.ts}</td>
      <td>${item.track || ""}</td>
      <td>${item.predOrder || ""}</td>
      <td>${item.actualOrder || ""}</td>
      <td class="${cls}">${item.hit ? "的中" : "ハズレ"}</td>
      <td>${(item.totalBet||0).toLocaleString()}円</td>
      <td>${(item.returnAmount||0).toLocaleString()}円</td>
      <td>${(item.profit||0).toLocaleString()}円</td>
      <td>${item.memo || ""}</td>
    </tr>`;
  }).join("");

  document.getElementById("historyTable").innerHTML = `<table>
    <thead><tr><th>日時</th><th>場</th><th>予想</th><th>結果</th><th>判定</th><th>購入</th><th>払戻</th><th>収支</th><th>メモ</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}
function saveResult(){
  if(!lastPrediction){
    resultEl.innerHTML = "先に予想を出してください。";
    return;
  }
  const actualOrder = (document.getElementById("actualOrder").value || "").trim();
  if(!actualOrder){
    resultEl.innerHTML = "実着順を入れてください。";
    return;
  }

  const hitOdds = parseFloat(document.getElementById("hitOdds").value);
  const memo = (document.getElementById("raceMemo").value || "").trim();
  const totalBet = lastPrediction.stakePlan.reduce((s,x)=>s + (x.stake||0), 0);
  const hitTicket = lastPrediction.stakePlan.find(x=>x.bet === actualOrder);
  const returnAmount = (hitTicket && !isNaN(hitOdds)) ? Math.round(hitTicket.stake * hitOdds) : 0;
  const hit = !!hitTicket;
  const profit = returnAmount - totalBet;

  const items = loadHistory();
  items.push({
    ts: new Date().toLocaleString("ja-JP"),
    track: lastPrediction.track,
    predOrder: lastPrediction.order,
    actualOrder,
    hit,
    totalBet,
    returnAmount,
    profit,
    memo
  });
  saveHistory(items);
  updateDashboard();

  document.getElementById("actualOrder").value = "";
  document.getElementById("hitOdds").value = "";
  document.getElementById("raceMemo").value = "";

  resultEl.innerHTML += `<div class="box"><b>保存完了</b><br>${hit ? "的中" : "ハズレ"} / 購入 ${totalBet.toLocaleString()}円 / 払戻 ${returnAmount.toLocaleString()}円 / 収支 ${profit.toLocaleString()}円</div>`;
}
function resetHistory(){
  localStorage.removeItem(STORAGE_KEY);
  updateDashboard();
}

  for(let i=1;i<=6;i++){ document.getElementById("tenji"+i).value=""; document.getElementById("demo"+i).value="0"; document.getElementById("form"+i).value=""; }

document.addEventListener("DOMContentLoaded",()=>{
  makeInputs();
  trackEl=document.getElementById("track");
  entryPatternEl=document.getElementById("entryPattern");
  oddsTextEl=document.getElementById("oddsText");
  pasteDataEl=document.getElementById("pasteData");
  resultEl=document.getElementById("result");
  scoreBoxEl=document.getElementById("scoreBox");
  rawDataEl=document.getElementById("rawData");
  windTypeEl=document.getElementById("windType");
  windPowerEl=document.getElementById("windPower");

  document.getElementById("btnFormat").addEventListener("click", ()=>{ convertRawToFormatted(); });
  document.getElementById("btnFormatAndPredict").addEventListener("click", ()=>{ if(convertRawToFormatted()) runPrediction(); });
  document.getElementById("btnPredict").addEventListener("click", runPrediction);
  document.getElementById("btnSample").addEventListener("click", ()=>{ fillSample(); });
  document.getElementById("btnClear").addEventListener("click", clearAll);
  document.getElementById("btnSaveResult").addEventListener("click", saveResult);
  document.getElementById("btnResetHistory").addEventListener("click", resetHistory);

  clearAll();
  updateDashboard();
});
