<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BOAT RACE AI PRO LUXE+</title>
<style>
:root{--bg:#f5f5f7;--bg2:#e9eef5;--card:rgba(255,255,255,.88);--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--navy:#0f172a;--steel:#334155;--gold:#bfa46f;--gold2:#eadcb8;--teal:#1f4d44;--wine:#6b3144}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:linear-gradient(135deg,var(--bg),var(--bg2))}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:36px}
.header{color:#fff;padding:20px 14px 22px;background:linear-gradient(135deg,var(--navy),var(--steel));border-bottom-left-radius:26px;border-bottom-right-radius:26px;box-shadow:0 14px 32px rgba(15,23,42,.22)}
.header h1{margin:0;font-size:24px}.header p{margin:6px 0 0;font-size:12px;opacity:.9}
.card{background:var(--card);backdrop-filter:blur(10px);margin:12px;border-radius:22px;padding:14px;box-shadow:0 10px 26px rgba(0,0,0,.08);border:1px solid rgba(191,164,111,.18)}
.section{font-weight:800;font-size:14px;margin-bottom:8px}.row{display:flex;gap:8px}.row>*{flex:1}.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;font-size:12px}
input,select,button{width:100%;padding:8px;border-radius:14px;font-size:16px;box-sizing:border-box} input,select{border:1.5px solid #ddd6c9;background:#fff} button{border:none;color:#fff;font-weight:800}
.btn-main{background:linear-gradient(135deg,var(--navy),var(--wine))}.btn-sub{background:linear-gradient(135deg,#64748b,#475569)}
.kpiWrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.kpi{border-radius:18px;padding:12px;text-align:center;color:#fff;font-weight:800}.kpi:nth-child(1){background:linear-gradient(135deg,var(--navy),#374151)}.kpi:nth-child(2){background:linear-gradient(135deg,var(--wine),#7c4a5e)}.kpi:nth-child(3){background:linear-gradient(135deg,var(--teal),#2c6a5f)} .kpi .label{font-size:12px;opacity:.9}.kpi .value{font-size:22px;margin-top:4px}
.badges{display:flex;flex-wrap:wrap;gap:6px}.badge{display:inline-block;padding:7px 11px;border-radius:999px;margin:4px;color:#fff;font-weight:800}.bet{background:linear-gradient(135deg,var(--teal),#255d53)} .warn{background:linear-gradient(135deg,var(--wine),#8f4b61)} .tip{background:linear-gradient(135deg,var(--navy),#3f4d63)} .gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827}
.table{width:100%;border-collapse:collapse}.table th,.table td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:center;font-size:14px}
.notice{font-size:12px;line-height:1.7;background:linear-gradient(135deg,#fafaf9,#f3f4f6);border:1.5px dashed #d6d3d1;padding:12px;border-radius:16px}
.hero{background:linear-gradient(135deg,var(--navy),#283447);color:#fff;border-radius:22px;padding:18px;text-align:center;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(234,220,184,.16),transparent)} .hero .mini,.hero .big,.hero .sub{position:relative}.hero .mini{font-size:12px;opacity:.86}.hero .big{font-size:42px;font-weight:900;line-height:1;margin-top:4px}.hero .sub{font-size:13px;opacity:.95;margin-top:6px;color:var(--gold2)}
.goldline{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px 0}
</style></head>
<body>
<div class="app">
<div class="header"><h1>BOAT RACE AI PRO LUXE+</h1><p>展示タイム差警告 / イン逃げ確率 / モーター評価 / 回収率AI</p></div>

<div class="card"><div class="section">基本設定</div><div class="row"><select id="trackEl"></select><input id="race" placeholder="例: 住之江 10R"></div></div>
<div class="card"><div class="section">入力</div><div class="grid"><div>艇</div><div>全国</div><div>当地</div><div>M2</div><div>B2</div><div>ST</div><div>展示</div><div>級</div></div><div id="inputs"></div></div>
<div class="card"><div class="row"><button id="btnSample" class="btn-main">サンプル</button><button id="btnClear" class="btn-sub">全消去</button></div><div class="row" style="margin-top:8px"><button id="btnAI" class="btn-main">AI予想</button></div></div>

<div class="card"><div class="section">本命表示</div><div class="hero"><div class="mini">AI本命</div><div class="big" id="hero">-</div><div class="sub" id="heroSub">BOAT RACE AI PRO LUXE+</div></div></div>

<div class="card"><div class="section">実戦サマリー</div><div class="badges">
<span class="badge gold" id="trust">イン逃げ確率 -</span>
<span class="badge tip" id="motorRank">モーター評価 -</span>
<span class="badge warn" id="tenjiWarn">展示タイム差警告 -</span>
<span class="badge bet" id="taste">回収率AI -</span>
</div></div>

<div class="card"><div class="section">予想結果</div><div class="kpiWrap"><div class="kpi"><div class="label">本命</div><div class="value" id="honmei">-</div></div><div class="kpi"><div class="label">回収率AI</div><div class="value" id="roi">-</div></div><div class="kpi"><div class="label">判断</div><div class="value" id="act">-</div></div></div></div>
<div class="card"><div class="section">AI順位</div><div class="goldline"></div><table class="table"><thead><tr><th>順位</th><th>艇</th><th>指数</th><th>展示順</th></tr></thead><tbody id="rank"></tbody></table></div>
<div class="card"><div class="section">買い目</div><div id="bets"></div><div id="hole"></div></div>
<div class="card"><div class="section">AIコメント</div><div id="comment" class="notice">入力してAI予想を押してください。</div></div>
</div>

<script>
const TRACKS=["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
const BIAS={"大村":[25,8,4,2],"戸田":[10,13,11,9],"江戸川":[6,13,14,12],"_":[19,10,7,5]};
function cb(c){return c==="A1"?10:c==="A2"?6:c==="B1"?3:0}
function courseBias(track, boat){const b=BIAS[track]||BIAS["_"]; return boat<=4?b[boat-1]:0;}
function tenjiRank(arr){let v=arr.filter(x=>x.tenji>0).sort((a,b)=>a.tenji-b.tenji); let m={}; v.forEach((x,i)=>m[x.boat]=i+1); arr.forEach(x=>x.tr=m[x.boat]||99);}
function trb(r){return r===1?12:r===2?8:r===3?5:r===4?3:0}
function roiJudge(arr){const s1=(arr[0]?.ai||0)-(arr[1]?.ai||0), s2=(arr[1]?.ai||0)-(arr[2]?.ai||0); if(arr[0]?.boat===1&&s1>=8) return ["A+","買い"]; if(s1>=5&&s2>=2) return ["A","買い"]; if(s1>=2) return ["B","抑え"]; return ["C","見送り"];}
function trustText(track, boat, topAi, secAi){const spread=(topAi-secAi).toFixed(1); if(track==="大村"&&boat===1) return `イン逃げ確率 高`; if(boat===1&&topAi-secAi>=6) return `イン逃げ確率 中`; return `イン逃げ確率 低`; }
function motorRank(arr){const top=arr.slice().sort((a,b)=>b.motor-a.motor)[0]; if(!top) return "モーター評価 -"; if(top.motor>=45) return `${top.boat}号艇 S`; if(top.motor>=38) return `${top.boat}号艇 A`; return `${top.boat}号艇 B`; }
function tenjiDiffWarn(arr){const valid=arr.filter(x=>x.tenji>0).sort((a,b)=>a.tenji-b.tenji); if(valid.length<2) return "展示タイム差警告 -"; const diff=(valid[1].tenji-valid[0].tenji).toFixed(2); if(diff>=0.06) return `展示差 大`; if(diff>=0.03) return `展示差 中`; return `展示差 小`; }
function runAI(){
  let arr=[], track=trackEl.value;
  for(let i=1;i<=6;i++){const rate=+document.getElementById("rate"+i).value||0, local=+document.getElementById("local"+i).value||0, motor=+document.getElementById("motor"+i).value||0, boat2=+document.getElementById("boat"+i).value||0, st=+document.getElementById("st"+i).value||0, tenji=+document.getElementById("tenji"+i).value||0, cls=document.getElementById("class"+i).value; arr.push({boat:i,rate,local,motor,boat2,st,tenji,cls});}
  tenjiRank(arr);
  arr=arr.map(x=>{let ai=x.rate*8+x.local*5+x.motor+x.boat2*0.5+(x.st>0?(0.20-x.st)*30:0)+(x.tenji>0?(7-x.tenji)*12:0)+trb(x.tr)+courseBias(track,x.boat)+cb(x.cls); return {...x,ai};}).sort((a,b)=>b.ai-a.ai);
  const [roi, act]=roiJudge(arr);
  honmei.textContent=arr[0].boat+"号艇"; hero.textContent=arr[0].boat+"号艇"; heroSub.textContent=`${roi} / ${act}`; document.getElementById("roi").textContent=roi; document.getElementById("act").textContent=act;
  trust.textContent=trustText(track,arr[0].boat,arr[0].ai,arr[1]?.ai||0); motorRankEl = document.getElementById("motorRank"); motorRankEl.textContent=`モーター評価 ${motorRank(arr)}`; tenjiWarn.textContent=tenjiDiffWarn(arr); taste.textContent=`回収率AI ${roi}`;
  rank.innerHTML=arr.map((x,i)=>`<tr><td>${i+1}</td><td>${x.boat}</td><td>${x.ai.toFixed(1)}</td><td>${x.tr===99?'-':x.tr}</td></tr>`).join("");
  bets.innerHTML=`<span class="badge bet">${arr[0].boat}-${arr[1].boat}-${arr[2].boat}</span><span class="badge bet">${arr[0].boat}-${arr[2].boat}-${arr[1].boat}</span><span class="badge tip">${arr[1].boat}-${arr[0].boat}-${arr[2].boat}</span>`;
  hole.innerHTML=`<span class="badge warn">${arr[2].boat}-${arr[0].boat}-${arr[3].boat}</span>`;
  comment.textContent=`回収率AI: ${roi} / 判断: ${act} / ${trust.textContent} / ${motorRankEl.textContent} / ${tenjiWarn.textContent}。`;
}
function fillSample(){trackEl.value="大村"; race.value="10R"; [[1,7.2,7.1,48,41,0.14,6.79,"A1"],[2,6.1,5.9,37,35,0.15,6.83,"A1"],[3,5.8,5.5,41,31,0.13,6.81,"A2"],[4,5.5,5.2,39,33,0.12,6.78,"A2"],[5,4.9,4.8,30,29,0.16,6.86,"B1"],[6,4.6,4.5,28,27,0.17,6.90,"B1"]].forEach(r=>{["rate","local","motor","boat","st","tenji"].forEach((k,idx)=>document.getElementById(k+r[0]).value=r[idx+1]); document.getElementById("class"+r[0]).value=r[7];});}
function clearAll(){race.value=""; for(let i=1;i<=6;i++){["rate","local","motor","boat","st","tenji"].forEach(k=>document.getElementById(k+i).value=""); document.getElementById("class"+i).value="A1";} honmei.textContent="-"; hero.textContent="-"; heroSub.textContent="BOAT RACE AI PRO LUXE+"; document.getElementById("roi").textContent="-"; document.getElementById("act").textContent="-"; trust.textContent="イン逃げ確率 -"; document.getElementById("motorRank").textContent="モーター評価 -"; tenjiWarn.textContent="展示タイム差警告 -"; taste.textContent="回収率AI -"; rank.innerHTML=""; bets.innerHTML=""; hole.innerHTML=""; comment.textContent="入力してAI予想を押してください。";}
window.addEventListener("DOMContentLoaded",()=>{trackEl.innerHTML=TRACKS.map(t=>`<option>${t}</option>`).join(""); inputs.innerHTML=Array.from({length:6},(_,i)=>`<div class="grid" style="margin-top:6px"><div>${i+1}</div><input id="rate${i+1}" inputmode="decimal"><input id="local${i+1}" inputmode="decimal"><input id="motor${i+1}" inputmode="decimal"><input id="boat${i+1}" inputmode="decimal"><input id="st${i+1}" inputmode="decimal"><input id="tenji${i+1}" inputmode="decimal"><select id="class${i+1}"><option>A1</option><option>A2</option><option>B1</option><option>B2</option></select></div>`).join(""); btnAI.addEventListener("click",runAI); btnSample.addEventListener("click",fillSample); btnClear.addEventListener("click",clearAll);});
</script>
</body></html>
